    <style>
        :root {
            --bg: #0f0f14;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222f;
            --text: #eee;
            --text-muted: #888;
            --accent: #c9a84c;
            --accent-soft: rgba(201, 168, 76, 0.12);
            --radius: 16px;
            --tap-min: 48px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 16px 40px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .back-link {
            align-self: flex-start;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-decoration: none;
            padding: 4px 8px;
            margin-bottom: 8px;
        }

        .back-link:hover { color: var(--text); }

        .header {
            text-align: center;
            padding: 16px 0 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #fff;
        }

        .header .meta {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .panel {
            width: 100%;
            margin-top: 28px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 20px;
        }

        .panel h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 14px;
        }

        .devoirs-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .devoirs-list li {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.95rem;
            line-height: 1.45;
            color: var(--text);
        }

        .devoirs-list li::before {
            content: "•";
            color: var(--accent);
            font-size: 1.2rem;
            line-height: 1;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .empty {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .skeleton {
            height: 14px;
            background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.08), rgba(255,255,255,0.04));
            background-size: 200% 100%;
            border-radius: 6px;
            animation: shimmer 1.4s ease-in-out infinite;
            margin-bottom: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="container">
        <a href="#" class="back-link" id="back-link">&larr; Retour</a>
        <header class="header">
            <h1 id="page-title">Devoirs</h1>
            <div class="meta" id="page-meta"></div>
        </header>
        <div id="content"></div>
    </div>

    <script>
    var ELEVES_WHITELIST = {
        japhet: { display: "Japhet" },
        tara:   { display: "Tara"   },
        dexter: { display: "Dexter" },
        messon: { display: "Messon" }
    };

    function escapeHtml(str) {
        var d = document.createElement("div");
        d.textContent = str;
        return d.innerHTML;
    }

    function formatDate(iso) {
        if (!iso) return "";
        var m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (!m) return iso;
        var months = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
        return parseInt(m[3], 10) + " " + months[parseInt(m[2], 10) - 1] + " " + m[1];
    }

    (function init() {
        // Slug from URL: /{slug}/devoirs (ou ?eleve= en fallback)
        var pathMatch = window.location.pathname.match(/^\/([^\/]+)\/devoirs\/?$/);
        var slug = pathMatch ? pathMatch[1].toLowerCase() : null;

        var eleve = slug && ELEVES_WHITELIST[slug] ? ELEVES_WHITELIST[slug] : null;

        var backLink = document.getElementById("back-link");
        backLink.href = slug ? "/" + slug : "/";

        if (!eleve) {
            document.getElementById("page-title").textContent = "Espace introuvable";
            document.getElementById("content").innerHTML =
                '<div class="panel"><p class="empty">Cette page n\'est pas reconnue. Retourne à l\'accueil pour t\'identifier.</p></div>';
            return;
        }

        document.getElementById("page-title").textContent = "Devoirs de " + eleve.display;

        var content = document.getElementById("content");
        content.innerHTML =
            '<div class="panel">' +
                '<div class="skeleton" style="width:60%"></div>' +
                '<div class="skeleton" style="width:90%"></div>' +
                '<div class="skeleton" style="width:75%"></div>' +
            '</div>';

        fetch("/api/eleves/" + slug + "/devoirs", { credentials: "omit" })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var date = data && data.date ? formatDate(data.date) : "";
                var devoirs = (data && Array.isArray(data.devoirs)) ? data.devoirs : null;

                if (date) {
                    document.getElementById("page-meta").textContent = "Dernier cours — " + date;
                }

                if (!devoirs || devoirs.length === 0) {
                    content.innerHTML =
                        '<div class="panel">' +
                            '<h2>Aucun devoir</h2>' +
                            '<p class="empty">Tu n\'as pas encore de devoir enregistré. Reviens après ton prochain cours.</p>' +
                        '</div>';
                    return;
                }

                var html = '<div class="panel"><h2>À travailler</h2><ul class="devoirs-list">';
                for (var i = 0; i < devoirs.length; i++) {
                    html += '<li>' + escapeHtml(devoirs[i]) + '</li>';
                }
                html += '</ul></div>';
                content.innerHTML = html;
            })
            .catch(function() {
                content.innerHTML =
                    '<div class="panel"><p class="empty">Impossible de charger tes devoirs. Vérifie ta connexion et réessaie.</p></div>';
            });
    })();
    </script>

    <script>
    (function() {
        var canvas = document.getElementById("bg-canvas");
        var ctx = canvas.getContext("2d");
        var particles = [];
        var COUNT = 18;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        function createParticle() {
            var w = 6 + Math.random() * 4;
            var h = 18 + Math.random() * 10;
            return {
                x: Math.random() * canvas.width,
                y: canvas.height + h,
                w: w, h: h, r: 2,
                speed: 0.15 + Math.random() * 0.35,
                opacity: 0.04 + Math.random() * 0.04,
                drift: (Math.random() - 0.5) * 0.3
            };
        }

        for (var i = 0; i < COUNT; i++) {
            var p = createParticle();
            p.y = Math.random() * canvas.height;
            particles.push(p);
        }

        function drawRoundRect(x, y, w, h, r, alpha) {
            ctx.globalAlpha = alpha;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fill();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.y -= p.speed;
                p.x += p.drift;
                drawRoundRect(p.x, p.y, p.w, p.h, p.r, p.opacity);
                if (p.y + p.h < 0) particles[i] = createParticle();
            }
            requestAnimationFrame(animate);
        }
        animate();
    })();
    </script>

</body>
