<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="description" content="Grilles harmoniques générées par IA selon tes types d'accords.">

    <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
    <style>
        :root {
            --bg: #0f0f14;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222f;
            --text: #eee;
            --text-muted: #888;
            --text-faint: #666;
            --v: #8B6FE8;
            --v-light: #a48ff0;
            --v-soft: rgba(139, 111, 232, 0.08);
            --v-soft-stronger: rgba(139, 111, 232, 0.15);
            --v-border: rgba(139, 111, 232, 0.3);
            --green: #3dd68c;
            --red:   #e85a5a;
            --radius: 16px;
            --tap-min: 44px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh; min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative; z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 12px 14px 24px;
            display: flex; flex-direction: column;
            min-height: 100vh; min-height: 100dvh;
        }

        /* ── Top bar ─────────────────────────────────────────── */
        .top-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 4px 0 8px;
        }
        .back-link {
            color: var(--text-muted);
            font-size: 1.1rem;
            text-decoration: none;
            min-width: 40px; min-height: 40px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 10px; flex-shrink: 0;
        }
        .back-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }

        .volume-bar {
            flex: 1; min-width: 0;
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
        }
        .volume-bar .volume-icon { font-size: 0.95rem; line-height: 1; flex-shrink: 0; }
        .volume-bar input[type="range"] { flex: 1; min-width: 0; accent-color: var(--v); cursor: pointer; }
        .volume-bar .volume-value {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: var(--text-muted); min-width: 38px; text-align: right;
            font-size: 0.78rem; flex-shrink: 0;
        }

        .header { text-align: center; padding: 6px 0 2px; }
        .header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; color: #fff; }
        .header .subtitle { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }

        /* ─ Section labels ─ */
        .section-label {
            font-size: 0.68rem; font-weight: 700;
            letter-spacing: 0.12em; color: var(--text-faint);
            text-transform: uppercase; margin-bottom: 8px;
        }

        /* ═══ PHASE 1 — Sélection ═══════════════════════════════ */
        .selection-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius);
            padding: 18px 16px;
            margin-top: 14px;
            display: flex; flex-direction: column; gap: 18px;
        }

        .types-counter {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: center;
        }
        .types-counter strong { color: var(--v); }
        .types-hint {
            font-size: 0.78rem;
            color: var(--v-light);
            margin-top: 4px;
            font-style: italic;
        }

        .type-families { display: flex; flex-direction: column; gap: 14px; }
        .family-group { display: flex; flex-direction: column; gap: 6px; }
        .family-label {
            font-size: 0.62rem; font-weight: 700;
            letter-spacing: 0.12em; color: var(--text-faint);
            text-transform: uppercase;
        }
        .type-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        @media (min-width: 768px) {
            .type-grid { grid-template-columns: repeat(6, 1fr); }
        }
        .type-btn {
            padding: 10px 6px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            min-height: var(--tap-min);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 1px; text-align: center;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .type-btn:hover { background: var(--bg-card-hover); border-color: var(--v-border); }
        .type-btn.checked {
            background: var(--v-soft-stronger);
            color: var(--v);
            border-color: var(--v);
        }
        .type-btn .type-id {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.85rem;
        }
        .type-btn .type-name {
            font-size: 0.6rem; color: var(--text-muted);
            line-height: 1.1; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; max-width: 100%;
        }
        .type-btn.checked .type-name { color: var(--v-light); }

        /* ─ Tempo slider ─ */
        .tempo-row {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        .tempo-row .tempo-label {
            font-size: 0.78rem; color: var(--text-muted);
            min-width: 50px;
        }
        .tempo-row input[type="range"] {
            flex: 1; min-width: 0;
            accent-color: var(--v); cursor: pointer;
        }
        .tempo-row .tempo-value {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: var(--v); font-weight: 600;
            min-width: 56px; text-align: right;
            font-size: 0.92rem;
        }

        /* ─ Generate button ─ */
        .btn-generate {
            width: 100%;
            padding: 16px;
            background: var(--v);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            min-height: 56px;
            box-shadow: 0 6px 20px rgba(139, 111, 232, 0.3);
            transition: background 0.15s, transform 0.12s, opacity 0.15s;
        }
        .btn-generate:hover:not(:disabled) { background: var(--v-light); }
        .btn-generate:active:not(:disabled) { transform: scale(0.98); }
        .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
        .btn-generate.loading {
            background: var(--bg-card-hover);
            color: var(--text-muted);
            cursor: wait;
        }

        /* ── Toast erreur ─ */
        .toast {
            position: fixed; left: 50%; bottom: 100px;
            transform: translateX(-50%);
            background: var(--red); color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            z-index: 1100;
            opacity: 0; pointer-events: none;
            transition: opacity 0.18s;
        }
        .toast.is-visible { opacity: 1; }

        /* ═══ PHASE 2 — Résultats ═══════════════════════════════ */
        /* Tempo bar sticky : reste accessible quand on scrolle les 5 cartes.
           Pin au top du viewport une fois que le header de page sort. */
        .tempo-bar {
            position: sticky; top: 0;
            z-index: 50;
            display: flex; align-items: center; gap: 10px;
            margin: 14px -14px 0; padding: 10px 14px;
            background: rgba(15, 15, 20, 0.88);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .tempo-bar .tempo-label {
            font-size: 0.72rem; font-weight: 700;
            color: var(--text-faint);
            letter-spacing: 0.12em; text-transform: uppercase;
            flex-shrink: 0;
        }
        .tempo-bar input[type="range"] {
            flex: 1; min-width: 0;
            accent-color: var(--v); cursor: pointer;
        }
        .tempo-bar .tempo-value {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: var(--v); font-weight: 600;
            min-width: 64px; text-align: right;
            font-size: 0.88rem;
            flex-shrink: 0;
        }

        .results-head {
            display: flex; align-items: center; justify-content: space-between;
            gap: 10px; margin-top: 14px; flex-wrap: wrap;
        }
        .btn-modify {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 14px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            min-height: 40px;
        }
        .btn-modify:hover { background: var(--bg-card-hover); }

        .progressions-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
            margin-top: 14px;
        }
        @media (min-width: 768px) {
            .progressions-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
        }

        .progression-card {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .progression-card.is-playing {
            border-color: var(--v);
            box-shadow: 0 0 0 1px var(--v-border), 0 4px 18px rgba(139,111,232,0.18);
        }
        .progression-key {
            font-size: 0.95rem;
            color: var(--v-light);
            font-weight: 600;
            letter-spacing: 0.01em;
        }
        .progression-chords {
            display: flex; flex-wrap: wrap; gap: 6px;
        }
        .chord-chip {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 1px;
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            min-width: 64px;
            transition: background 0.15s, border-color 0.15s, transform 0.15s;
        }
        .chord-chip .chord-name {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text);
        }
        .chord-chip .chord-degree {
            font-size: 0.62rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        .chord-chip.active {
            background: var(--v-soft-stronger);
            border-color: var(--v);
            transform: scale(1.05);
        }
        .chord-chip.active .chord-name { color: var(--v); }
        .chord-chip.active .chord-degree { color: var(--v-light); }

        .progression-actions {
            display: flex; gap: 8px;
        }
        .btn-play-prog {
            flex: 1;
            padding: 12px;
            background: var(--v);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            min-height: 48px;
            transition: background 0.15s, transform 0.12s, opacity 0.15s;
        }
        .btn-play-prog:hover:not(:disabled) { background: var(--v-light); }
        .btn-play-prog:active:not(:disabled) { transform: scale(0.98); }
        .btn-play-prog:disabled { opacity: 0.35; cursor: not-allowed; }
        .btn-play-prog.is-playing {
            background: var(--bg);
            color: var(--v);
            border: 1px solid var(--v);
        }

        @media (max-width: 480px) {
            .header h1 { font-size: 1.2rem; }
            .header .subtitle { font-size: 0.78rem; }
            .selection-card { padding: 14px 12px; }
            .progression-card { padding: 12px; }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">

        <header class="top-bar">
            <a href="#" class="back-link" id="back-link" aria-label="Retour">&larr;</a>
            <div class="volume-bar">
                <span class="volume-icon">🔊</span>
                <input type="range" id="volume-slider" min="0" max="100" step="1" value="70" aria-label="Volume" />
                <span class="volume-value" id="volume-value">70%</span>
            </div>
        </header>

        <header class="header" id="page-header">
            <h1 id="page-title">Grilles harmoniques</h1>
            <p class="subtitle" id="page-subtitle">Choisis les types à travailler</p>
        </header>

        <main id="main-area">
            <!-- Rendu dynamique : phase = selection | results -->
        </main>

    </div>

    <div class="toast" id="toast"></div>

    <script src="/mh-music-theory.js"></script>
    <script src="/grilles.js"></script>

    <script>
    (function () {
        var canvas = document.getElementById("bg-canvas");
        var ctx = canvas.getContext("2d");
        var particles = [];
        var COUNT = 18;
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener("resize", resize);
        resize();
        function createParticle() {
            var w = 6 + Math.random() * 4;
            var h = 18 + Math.random() * 10;
            return {
                x: Math.random() * canvas.width,
                y: canvas.height + h,
                w: w, h: h, r: 2,
                speed: 0.15 + Math.random() * 0.35,
                opacity: 0.04 + Math.random() * 0.04,
                drift: (Math.random() - 0.5) * 0.3
            };
        }
        for (var i = 0; i < COUNT; i++) { var p = createParticle(); p.y = Math.random() * canvas.height; particles.push(p); }
        function drawRoundRect(x, y, w, h, r, alpha) {
            ctx.globalAlpha = alpha;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fill();
        }
        var rafId = null;
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.y -= p.speed;
                p.x += p.drift;
                drawRoundRect(p.x, p.y, p.w, p.h, p.r, p.opacity);
                if (p.y + p.h < 0) particles[i] = createParticle();
            }
            rafId = requestAnimationFrame(animate);
        }
        animate();
        var stopAnim = function () {
            if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
            window.removeEventListener("resize", resize);
        };
        window.addEventListener("beforeunload", stopAnim);
        window.addEventListener("pagehide", stopAnim);
    })();
    </script>

    <script src="/nav-outils.js" data-active="grilles"></script>

</body>
