<!DOCTYPE html>
<html lang="fr">
<head>
  <script>
  (function(){
    if (localStorage.getItem('mh_admin') !== '4697') {
      window.location.replace('/admin/');
    }
  })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mes boucles — Master Hub Admin</title>
  <meta name="theme-color" content="#0f0e18">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- SoundTouchJS pour time-stretch (préserve le pitch) — ESM via Skypack -->
  <!-- SoundTouchJS 0.1.30 est ESM-only : le bundle UMD ne crée aucun global.
       Skypack prépare le package npm pour un import ESM browser-natif. -->
  <script type="module">
    import { PitchShifter } from 'https://cdn.skypack.dev/soundtouchjs@0.1.26';
    window.PitchShifter = PitchShifter;
    window.dispatchEvent(new CustomEvent('soundtouch-ready'));
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --v:       #8B6FE8;
      --v-dim:   rgba(139,111,232,0.15);
      --v-soft:  #6b54c4;
      --bg0:     #09090f;
      --bg1:     #0f0e18;
      --bg2:     #161524;
      --bg3:     #1e1c30;
      --text1:   #eeeaf8;
      --text2:   #9d9ab5;
      --text3:   #5a5870;
      --border:  #25233a;
      --green:   #5ecb8b;
      --amber:   #f0b429;
      --red:     #e05c6b;
      --radius:  10px;
    }

    html, body { min-height: 100%; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg0);
      color: var(--text1);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Mini-header ───────────────────────────────────────── */
    .mh-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg0);
    }
    .mh-back {
      color: var(--text2); text-decoration: none; font-size: 14px;
      padding: 6px 12px; border-radius: 8px;
      transition: background .15s, color .15s;
    }
    .mh-back:hover { background: var(--bg2); color: var(--text1); }
    .mh-title { margin: 0; font-size: 18px; font-weight: 600; color: var(--text1); }
    .mh-logout {
      background: none; border: 1px solid var(--border); color: var(--text2);
      padding: 6px 12px; border-radius: 8px; font-size: 13px; cursor: pointer;
      font-family: inherit;
      transition: background .15s, color .15s;
    }
    .mh-logout:hover { background: var(--bg2); color: var(--text1); }
    @media (max-width: 500px) {
      .mh-header { padding: 12px 16px; }
      .mh-title { font-size: 16px; }
      .mh-logout { font-size: 12px; padding: 4px 10px; }
    }

    /* ── Layout principal ──────────────────────────────────── */
    .app {
      max-width: 1100px; margin: 0 auto;
      padding: 20px 24px 60px;
      display: flex; flex-direction: column; gap: 20px;
    }
    @media (max-width: 768px) { .app { padding: 16px 14px 60px; } }

    /* ── Upload zone ───────────────────────────────────────── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 28px 20px;
      text-align: center;
      background: var(--bg1);
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .upload-zone:hover { border-color: var(--v); background: var(--bg2); }
    .upload-zone.drag-over { border-color: var(--v); background: var(--v-dim); }
    .upload-zone .icon { font-size: 28px; margin-bottom: 6px; }
    .upload-zone p { color: var(--text2); font-size: 14px; }
    .upload-zone p .accent { color: var(--v); }
    .upload-zone input[type="file"] { display: none; }

    /* ── Categories bar ────────────────────────────────────── */
    .cat-bar {
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    }
    .cat-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 12.5px; font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, border-color .15s, color .15s;
    }
    .cat-pill:hover { border-color: var(--v); color: var(--text1); }
    .cat-pill.active { background: var(--v); border-color: var(--v); color: #fff; }
    .cat-pill.add-cat {
      border-style: dashed;
      color: var(--text3);
    }
    .cat-pill.add-cat:hover { color: var(--v); border-color: var(--v); }

    /* ── Loops list ────────────────────────────────────────── */
    .loops-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (max-width: 768px) {
      .loops-list { grid-template-columns: 1fr; gap: 10px; }
    }

    .loop-card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
    }

    .loop-card .top {
      display: flex; align-items: center; gap: 10px;
    }
    .play-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--v);
      border: none;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    .play-btn:hover { background: var(--v-soft); }
    .play-btn:active { transform: scale(0.96); }
    .play-btn.playing { background: #fff; color: var(--v); }
    /* États transitionnels du bouton play (preload + lock anti-double-clic + erreur) */
    .play-btn.loading {
      opacity: 0.55;
      cursor: wait;
      pointer-events: none;
    }
    .play-btn.locked {
      opacity: 0.7;
      pointer-events: none;
    }
    .play-btn.error {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
      background: var(--bg3);
      color: #e05c6b;
    }

    /* Tant que SoundTouch (ESM) charge, bloque tous les play. CSS global. */
    body.engine-loading .play-btn {
      opacity: 0.5;
      cursor: wait;
      pointer-events: none;
    }
    .engine-loading-notice {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text2);
      font-size: 13px;
    }
    body.engine-loading .engine-loading-notice {
      display: flex;
    }
    .mini-spinner {
      width: 14px; height: 14px; flex-shrink: 0;
      border: 2px solid var(--border);
      border-top-color: var(--v);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    .loop-name {
      flex: 1; min-width: 0;
      font-size: 14px; font-weight: 600; color: var(--text1);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      cursor: text;
      padding: 2px 4px;
      border-radius: 4px;
      transition: opacity .15s, background .15s;
    }
    .loop-name:hover { opacity: 0.7; background: var(--bg2); }
    .loop-name input.name-edit {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--v);
      color: var(--text1);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 1px 4px;
      border-radius: 4px;
      outline: none;
    }
    .loop-name input.name-edit:disabled { opacity: 0.5; cursor: wait; }
    .bpm-badge {
      font-size: 11px; font-family: 'DM Mono', monospace;
      color: var(--text2);
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color .15s, color .15s;
    }
    .bpm-badge:hover { border-color: var(--v); color: var(--v); }
    .bpm-badge.unset { color: var(--text3); font-style: italic; }

    .delete-btn {
      background: none; border: none; color: var(--text3);
      font-size: 16px; cursor: pointer; padding: 4px;
      flex-shrink: 0;
      transition: color .15s;
      font-family: inherit;
    }
    .delete-btn:hover { color: var(--red); }

    .meta-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text3);
      font-family: 'DM Mono', monospace;
    }
    .meta-row .sep { color: var(--border); }

    .tags-area {
      display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: background .15s;
    }
    .tags-area:hover { background: var(--bg2); }
    .tag-chip {
      font-size: 10.5px; font-family: 'DM Mono', monospace;
      background: var(--v-dim);
      color: var(--v);
      padding: 2px 7px;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }
    .tag-chip.empty {
      background: transparent;
      color: var(--text3);
      border: 1px dashed var(--border);
      font-style: italic;
    }

    .tag-dropdown {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      display: flex; flex-direction: column; gap: 4px;
      max-height: 220px;
      overflow-y: auto;
    }
    .tag-dropdown label {
      display: flex; align-items: center; gap: 6px;
      font-size: 12.5px;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
    }
    .tag-dropdown label:hover { background: var(--bg3); }
    .tag-dropdown input[type="checkbox"] { accent-color: var(--v); }
    .tag-dropdown .dd-actions {
      display: flex; gap: 6px; margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
    }
    .tag-dropdown button {
      flex: 1;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    .tag-dropdown .btn-save { background: var(--v); color: #fff; border: 1px solid var(--v); }
    .tag-dropdown .btn-cancel { background: none; color: var(--text2); border: 1px solid var(--border); }

    /* ── Waveform ──────────────────────────────────────────── */
    .waveform-wrap {
      position: relative;
      height: 40px;
      background: var(--bg2);
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      touch-action: none; /* empêche le scroll mobile pendant le drag */
      user-select: none;
    }
    .waveform-wrap.dragging { cursor: grabbing; }
    .waveform-canvas {
      display: block;
      width: 100%;
      height: 100%;
      pointer-events: none; /* le wrap gère les clics, le canvas ne bloque pas */
    }
    .waveform-cursor {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: rgba(255,255,255,0.85);
      pointer-events: none;
      transition: left .05s linear;
      box-shadow: 0 0 4px rgba(255,255,255,0.5);
    }

    /* ── Sliders (volume + tempo) ─────────────────────────── */
    .sliders {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    @media (max-width: 500px) {
      .sliders { grid-template-columns: 1fr; gap: 8px; }
    }
    .slider-group { display: flex; flex-direction: column; gap: 4px; }
    .slider-label {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 10.5px;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .slider-label .value { color: var(--v); font-weight: 600; }
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px;
      background: var(--bg3);
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px;
      background: var(--v);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(139,111,232,0.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px;
      background: var(--v);
      border: none;
      border-radius: 50%;
      cursor: pointer;
    }

    /* ── Empty & loading states ───────────────────────────── */
    .empty-state, .error-state {
      padding: 50px 20px;
      text-align: center;
      color: var(--text3);
      font-size: 14px;
    }
    .empty-state .icon { font-size: 38px; opacity: 0.4; margin-bottom: 10px; }
    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--v);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 30px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ─────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(9,9,15,0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .modal h2 {
      font-size: 16px; font-weight: 600; color: var(--text1);
    }
    .modal .field { display: flex; flex-direction: column; gap: 6px; }
    .modal label {
      font-size: 11px; color: var(--text3);
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.05em;
    }
    .modal input[type="text"], .modal input[type="number"] {
      background: var(--bg2);
      color: var(--text1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s;
    }
    .modal input[type="text"]:focus, .modal input[type="number"]:focus {
      border-color: var(--v);
    }
    .modal .cat-multi {
      display: flex; flex-wrap: wrap; gap: 4px;
      max-height: 140px; overflow-y: auto;
      padding: 6px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .modal .cat-multi label {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 8px;
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      text-transform: none;
      letter-spacing: 0;
      font-family: inherit;
      color: var(--text2);
    }
    .modal .cat-multi label:has(input:checked) {
      background: var(--v-dim);
      border-color: var(--v);
      color: var(--v);
    }
    .modal input[type="checkbox"] { accent-color: var(--v); }
    .modal .actions {
      display: flex; gap: 8px; margin-top: 4px;
    }
    .modal button {
      flex: 1; padding: 10px 14px;
      border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: inherit;
    }
    .btn-primary { background: var(--v); color: #fff; border: 1px solid var(--v); }
    .btn-primary:hover { background: var(--v-soft); }
    .btn-primary:disabled { opacity: 0.5; cursor: wait; }
    .btn-secondary { background: none; color: var(--text2); border: 1px solid var(--border); }
    .btn-secondary:hover { color: var(--text1); border-color: var(--text2); }

    .upload-progress {
      width: 100%;
      height: 4px;
      background: var(--bg3);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 6px;
    }
    .upload-progress .bar {
      height: 100%;
      background: var(--v);
      border-radius: 2px;
      width: 0%;
      transition: width .2s;
    }

    /* ── Toast ─────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: var(--bg2);
      border: 1px solid var(--v);
      color: var(--text1);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 200;
      opacity: 0;
      transition: opacity .2s;
    }
    .toast.show { opacity: 1; }
    .toast.error { border-color: var(--red); }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ═══ MINI-HEADER ════════════════════════════════════════════ -->
<header class="mh-header">
  <a href="/admin/outils.html" class="mh-back">&larr; Outils</a>
  <h1 class="mh-title">Mes boucles</h1>
  <button class="mh-logout" type="button" onclick="localStorage.removeItem('mh_admin'); window.location.replace('/admin/');">Se d&eacute;connecter</button>
</header>

<!-- ═══ APP ═══════════════════════════════════════════════════ -->
<div class="app">

  <!-- Notice de chargement du moteur audio (visible tant que body.engine-loading) -->
  <div class="engine-loading-notice" id="engine-notice">
    <div class="mini-spinner"></div>
    <span>Chargement du moteur audio…</span>
  </div>

  <!-- Upload zone -->
  <label class="upload-zone" id="upload-zone">
    <div class="icon">🥁</div>
    <p>Glisse un MP3 ici ou <span class="accent">clique pour sélectionner</span></p>
    <p style="font-size:11px;color:var(--text3);margin-top:4px;">.mp3 — max 20 Mo par fichier</p>
    <input type="file" id="file-input" accept="audio/mpeg,audio/mp3,.mp3" multiple>
  </label>

  <!-- Categories filter bar -->
  <nav class="cat-bar" id="cat-bar"></nav>

  <!-- Loops list -->
  <div id="loops-container">
    <div class="spinner"></div>
  </div>

</div>

<!-- ═══ UPLOAD MODAL ════════════════════════════════════════════ -->
<div class="modal-overlay hidden" id="upload-modal">
  <div class="modal">
    <h2>Nouveau(x) loop(s)</h2>
    <div class="field">
      <label>Fichiers</label>
      <div id="upload-files-list" style="font-size:12.5px;color:var(--text2);max-height:120px;overflow-y:auto;"></div>
    </div>
    <div class="field">
      <label>BPM (optionnel)</label>
      <input type="number" id="upload-bpm" placeholder="ex: 90 — laisser vide si inconnu" min="40" max="220">
    </div>
    <div class="field">
      <label>Catégories (multi)</label>
      <div class="cat-multi" id="upload-cats"></div>
    </div>
    <div class="upload-progress" id="upload-progress" style="display:none;">
      <div class="bar" id="upload-bar"></div>
    </div>
    <div class="actions">
      <button type="button" class="btn-secondary" id="upload-cancel">Annuler</button>
      <button type="button" class="btn-primary"   id="upload-submit">Importer</button>
    </div>
  </div>
</div>

<!-- ═══ ADD CATEGORY MODAL ═════════════════════════════════════ -->
<div class="modal-overlay hidden" id="cat-modal">
  <div class="modal">
    <h2>Nouvelle catégorie</h2>
    <div class="field">
      <label>Nom</label>
      <input type="text" id="cat-name" placeholder="ex: Hip-Hop" maxlength="30">
    </div>
    <div class="actions">
      <button type="button" class="btn-secondary" id="cat-cancel">Annuler</button>
      <button type="button" class="btn-primary"   id="cat-submit">Ajouter</button>
    </div>
  </div>
</div>

<!-- ═══ TOAST ═══════════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<script>
// ─── Helpers ───────────────────────────────────────────────────
function authHeaders() {
  return { 'x-admin-secret': localStorage.getItem('mh_admin') || '' };
}
function esc(s) {
  if (s === null || s === undefined) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}
function fmtSize(b) {
  if (b < 1048576) return (b / 1024).toFixed(1) + ' Ko';
  return (b / 1048576).toFixed(1) + ' Mo';
}
function fmtDuration(s) {
  if (!s || !Number.isFinite(s)) return '?';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${String(sec).padStart(2, '0')}`;
}
let _toastTid = null;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  clearTimeout(_toastTid);
  _toastTid = setTimeout(() => t.classList.remove('show'), 2400);
}

// ─── État global ───────────────────────────────────────────────
let allLoops = [];
let allCategories = [];
let activeFilter = 'all'; // 'all' ou nom de catégorie

// Audio
let audioCtx = null;
const audioBufferCache = {}; // { loopId: AudioBuffer }
let activePlayback = null;   // { loopId, source, gain, startTime, rate, rafId }

// Upload pending
let pendingUploadFiles = [];

// ─── API calls ─────────────────────────────────────────────────
async function apiList() {
  const res = await fetch('/api/loops', { headers: authHeaders() });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.json();
}

async function apiUpload(file, { bpm, tags, durationSec }) {
  const fd = new FormData();
  fd.append('file', file, file.name);
  fd.append('filename', file.name);
  if (bpm !== null && bpm !== '' && Number.isFinite(Number(bpm))) {
    fd.append('bpm', String(bpm));
  }
  fd.append('tags', JSON.stringify(tags || []));
  fd.append('duration_sec', String(durationSec || 0));

  const res = await fetch('/api/loops', {
    method: 'POST',
    headers: authHeaders(),
    body: fd,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok || !data.ok) {
    throw new Error(data.error || 'HTTP ' + res.status);
  }
  return data;
}

// ─── Audio decoding & cache ────────────────────────────────────
function ensureAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(() => {});
  }
  return audioCtx;
}

// Dédup de promesses : si plusieurs callers (preload + click play) demandent
// le même audio simultanément, on partage la même Promise (pas de double fetch)
const audioBufferPromises = {};

async function fetchAndDecode(loopId) {
  if (audioBufferCache[loopId]) return audioBufferCache[loopId];
  if (audioBufferPromises[loopId]) return audioBufferPromises[loopId];

  audioBufferPromises[loopId] = (async () => {
    try {
      const res = await fetch(`/api/loops/${encodeURIComponent(loopId)}/audio`, {
        headers: authHeaders(),
      });
      if (!res.ok) throw new Error('Audio HTTP ' + res.status);
      const arr = await res.arrayBuffer();
      const ctx = ensureAudioCtx();
      // decodeAudioData copie le buffer ; on lui passe une copie pour éviter les
      // soucis de transfert entre threads/contextes
      const buf = await ctx.decodeAudioData(arr.slice(0));
      audioBufferCache[loopId] = buf;
      return buf;
    } finally {
      delete audioBufferPromises[loopId];
    }
  })();

  return audioBufferPromises[loopId];
}

// État du préchargement par loopId : 'loading' | 'ready' | 'error'
const loadStates = {};
// Lock anti-double-clic par loopId : true pendant les transitions play/pause
const playLocks = {};

// Met à jour l'apparence du bouton play selon l'état combiné
// (loading > error > locked > playing > idle)
function updatePlayBtnState(btn, loopId) {
  if (!btn) return;
  btn.classList.remove('loading', 'error', 'locked');
  if (loadStates[loopId] === 'loading') {
    btn.classList.add('loading');
    btn.textContent = '⏳';
    return;
  }
  if (loadStates[loopId] === 'error') {
    btn.classList.add('error');
    btn.textContent = '⚠';
    return;
  }
  if (playLocks[loopId]) {
    btn.classList.add('locked');
    // textContent : reflète l'état effectif (▶ idle, ■ playing) pendant le lock
    btn.textContent = (activePlayback?.loopId === loopId) ? '■' : '▶';
    return;
  }
  if (activePlayback?.loopId === loopId) {
    btn.classList.add('playing');
    btn.textContent = '■';
  } else {
    btn.classList.remove('playing');
    btn.textContent = '▶';
  }
}

// Pré-charge l'audio + décode + render waveform en background à la création de la card.
// Appelé pour chaque loop visible. Idempotent (skip si déjà ready/loading).
function preloadCardAudio(loopId) {
  if (loadStates[loopId] === 'ready' || loadStates[loopId] === 'loading') return;
  loadStates[loopId] = 'loading';
  const btn = document.querySelector(`.play-btn[data-id="${loopId}"]`);
  updatePlayBtnState(btn, loopId);
  fetchAndDecode(loopId).then(buf => {
    loadStates[loopId] = 'ready';
    const btn2 = document.querySelector(`.play-btn[data-id="${loopId}"]`);
    updatePlayBtnState(btn2, loopId);
    const canvas = document.querySelector(`.waveform-canvas[data-id="${loopId}"]`);
    if (canvas && !canvas.dataset.rendered) {
      renderWaveform(canvas, buf);
      canvas.dataset.rendered = 'true';
    }
  }).catch(e => {
    loadStates[loopId] = 'error';
    const btn2 = document.querySelector(`.play-btn[data-id="${loopId}"]`);
    updatePlayBtnState(btn2, loopId);
    console.warn('[loops] preload failed:', loopId, e.message);
  });
}

// iOS / Safari : créer + reprendre l'AudioContext au tout premier click ou touch
// (les navigateurs exigent une user gesture pour autoriser la lecture audio)
function unlockAudioOnce() {
  ensureAudioCtx();
  document.removeEventListener('click',      unlockAudioOnce);
  document.removeEventListener('touchstart', unlockAudioOnce);
}
document.addEventListener('click',      unlockAudioOnce, { passive: true });
document.addEventListener('touchstart', unlockAudioOnce, { passive: true });

// ─── Waveform rendering ────────────────────────────────────────
function renderWaveform(canvas, audioBuffer) {
  if (!canvas || !audioBuffer) return;
  // Match canvas pixel size to display size for crispness
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = Math.floor(rect.width * dpr);
  canvas.height = Math.floor(rect.height * dpr);
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const w = rect.width;
  const h = rect.height;
  ctx.clearRect(0, 0, w, h);

  const data = audioBuffer.getChannelData(0);
  const samplesPerBar = Math.max(1, Math.floor(data.length / 240));
  const barWidth = w / Math.ceil(data.length / samplesPerBar);
  const gap = Math.max(0, barWidth * 0.25);
  const drawBarWidth = Math.max(1, barWidth - gap);

  ctx.fillStyle = '#8B6FE8';
  let x = 0;
  for (let i = 0; i < data.length; i += samplesPerBar) {
    let max = 0;
    const end = Math.min(i + samplesPerBar, data.length);
    for (let j = i; j < end; j++) {
      const a = Math.abs(data[j]);
      if (a > max) max = a;
    }
    const barH = Math.max(1, max * h * 0.9);
    ctx.fillRect(x, (h - barH) / 2, drawBarWidth, barH);
    x += barWidth;
  }
}

// ─── Playback (SoundTouchJS — pitch préservé) ──────────────────
// PitchShifter remplace l'AudioBufferSourceNode + playbackRate :
//   - shifter.tempo = X ∈ [0.7, 1.3] → change la vitesse SANS toucher le pitch
//   - shifter.pitch = 1.0 → toujours fixé, on ne modifie jamais le pitch
//   - shifter est one-shot (instance jetable, recréé à chaque play)
//
// SoundTouchJS est importé en ESM natif via Skypack (script module en <head>).
// window.PitchShifter est défini une fois le module chargé, puis l'event
// 'soundtouch-ready' est émis pour débloquer l'UI.

// État de readiness du moteur audio + blocage UI tant que pas prêt
let soundtouchReady = false;
document.body.classList.add('engine-loading');

window.addEventListener('soundtouch-ready', () => {
  soundtouchReady = true;
  document.body.classList.remove('engine-loading');
});

// Timeout de sécurité : si après 10s le module ESM n'a pas chargé, on alerte
setTimeout(() => {
  if (!soundtouchReady) {
    showToast("Le moteur audio n'a pas pu se charger. Recharge la page (Ctrl+Shift+R).", true);
  }
}, 10000);

// ─── Slicing du buffer pour seek fiable ─────────────────────────
// SoundTouchJS 0.1.26 (via Skypack) : le setter shifter.percentagePlayed = X
// ne produit pas de seek fiable (position souvent reset à 0). Fix robuste :
// slicer l'AudioBuffer à partir du sample correspondant au startRatio et
// créer le PitchShifter sur ce buffer réduit. Le shifter joue alors de 0 à
// 100 % du slice, et on reconstitue la position absolue via :
//   positionRatio = startRatio + (1 - startRatio) * sliceProgress
function sliceAudioBuffer(ctx, originalBuffer, startRatio) {
  if (!startRatio || startRatio <= 0) return originalBuffer;
  const clampedRatio = Math.min(0.9999, Math.max(0, startRatio));
  const startSample = Math.floor(originalBuffer.length * clampedRatio);
  const newLength = originalBuffer.length - startSample;
  if (newLength <= 0) return originalBuffer;
  const newBuffer = ctx.createBuffer(
    originalBuffer.numberOfChannels,
    newLength,
    originalBuffer.sampleRate
  );
  for (let ch = 0; ch < originalBuffer.numberOfChannels; ch++) {
    const src = originalBuffer.getChannelData(ch);
    const dst = newBuffer.getChannelData(ch);
    dst.set(src.subarray(startSample));
  }
  return newBuffer;
}

function createShifterAtPosition(ctx, audioBuffer, startRatio) {
  const src = startRatio > 0 ? sliceAudioBuffer(ctx, audioBuffer, startRatio) : audioBuffer;
  // Buffer 4096 (~93 ms latence à 44.1 kHz) : compromis qualité/réactivité.
  // 16384 produisait trop de latence perçue sur mobile au démarrage.
  return new window.PitchShifter(ctx, src, 4096);
}

// Boucle requestAnimationFrame qui poll shifter.percentagePlayed (propriété
// SoundTouchJS) pour animer le curseur waveform. La progression du shifter
// est relative au buffer slicé ; on reconstruit la position absolue avec
// activePlayback.startRatio (position de départ dans le buffer original).
function startCursorLoop(loopId) {
  if (!activePlayback || activePlayback.loopId !== loopId) return;
  function tick() {
    if (!activePlayback || activePlayback.loopId !== loopId || !activePlayback.shifter) return;
    const sh = activePlayback.shifter;
    const startRatio = activePlayback.startRatio || 0;
    if (typeof sh.percentagePlayed === 'number' && Number.isFinite(sh.percentagePlayed)) {
      const sliceProgress = Math.min(1, Math.max(0, sh.percentagePlayed / 100));
      const absoluteRatio = startRatio + (1 - startRatio) * sliceProgress;
      const cursor = document.querySelector(`.waveform-cursor[data-id="${loopId}"]`);
      if (cursor) cursor.style.left = (Math.min(1, Math.max(0, absoluteRatio)) * 100) + '%';
    }
    activePlayback.rafId = requestAnimationFrame(tick);
  }
  activePlayback.rafId = requestAnimationFrame(tick);
}

// Positions mémorisées par loopId (pause/resume + drag seek).
// lastPositions[loopId] ∈ [0, 1] — ratio de progression dans le loop.
const lastPositions = {};

// État du drag waveform global (partagé entre toutes les cards via document listeners)
let waveformDrag = null; // { loopId, wrap, wasPlayingBeforeDrag }

function stopPlayback(opts = {}) {
  if (!activePlayback) return;
  const { shifter, gain, loopId, rafId, startRatio } = activePlayback;

  // 0. CAPTURE la position ABSOLUE avant tout (sauf reset explicite)
  // Le shifter rapporte un % relatif au buffer slicé, on reconstruit l'absolu.
  if (opts.resetPosition) {
    lastPositions[loopId] = 0;
  } else if (shifter && typeof shifter.percentagePlayed === 'number' && Number.isFinite(shifter.percentagePlayed)) {
    const sliceProgress = Math.min(1, Math.max(0, shifter.percentagePlayed / 100));
    const sr = startRatio || 0;
    const absoluteRatio = sr + (1 - sr) * sliceProgress;
    lastPositions[loopId] = Math.min(1, Math.max(0, absoluteRatio));
  }

  // 1. Stoppe la boucle d'animation du curseur
  if (rafId) cancelAnimationFrame(rafId);

  // 2. Fade-out 20 ms sur le gainNode pour éviter les "clics" audio à la coupure
  const ctx = audioCtx;
  if (gain && ctx && ctx.state !== 'closed') {
    try {
      const now = ctx.currentTime;
      gain.gain.cancelScheduledValues(now);
      gain.gain.setValueAtTime(Math.max(0.0001, gain.gain.value), now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.02);
    } catch (_) {}
    setTimeout(() => {
      try { shifter.disconnect(); } catch (_) {}
      try { gain.disconnect(); } catch (_) {}
    }, 25);
  } else {
    try { shifter.disconnect(); } catch (_) {}
    try { if (gain) gain.disconnect(); } catch (_) {}
  }

  // 3. Reset UI : bouton → ▶, curseur visuel ← position mémorisée (0 si reset)
  const btn = document.querySelector(`.play-btn[data-id="${loopId}"]`);
  if (btn) { btn.classList.remove('playing'); btn.textContent = '▶'; }
  const cursor = document.querySelector(`.waveform-cursor[data-id="${loopId}"]`);
  if (cursor) cursor.style.left = ((lastPositions[loopId] || 0) * 100) + '%';
  activePlayback = null;
}

async function togglePlay(loopId) {
  // Garde 1 : audio pas encore chargé/décodé
  if (loadStates[loopId] === 'loading') {
    showToast('Audio en cours de chargement…');
    return;
  }
  if (loadStates[loopId] === 'error') {
    showToast('Erreur audio — recharge la page', true);
    return;
  }
  // Garde 2 : transition déjà en cours sur ce loop (anti double-tap)
  if (playLocks[loopId]) return;

  playLocks[loopId] = true;
  const btn = document.querySelector(`.play-btn[data-id="${loopId}"]`);
  updatePlayBtnState(btn, loopId);

  try {
    // Toggle : si déjà en cours sur ce loop, arrête et sors
    const wasActive = activePlayback?.loopId === loopId;
    stopPlayback();
    if (wasActive) return;

    let buffer;
    try { buffer = await fetchAndDecode(loopId); }
    catch (e) { showToast('Erreur audio : ' + e.message, true); return; }

    // Render waveform si pas encore fait (filet de sécurité — preload le fait normalement)
    const canvas = document.querySelector(`.waveform-canvas[data-id="${loopId}"]`);
    if (canvas && !canvas.dataset.rendered) {
      renderWaveform(canvas, buffer);
      canvas.dataset.rendered = 'true';
    }

    const PitchShifter = window.PitchShifter;
    if (typeof PitchShifter !== 'function') {
      showToast('Moteur audio pas encore prêt — patiente une seconde.', true);
      return;
    }

    const ctx = ensureAudioCtx();

    // Reset des sliders à 100 % à chaque nouveau play (pas de persistance)
    const card = document.querySelector(`.loop-card[data-id="${loopId}"]`);
    const volumeSlider = card?.querySelector('.volume-slider');
    const rateSlider   = card?.querySelector('.rate-slider');
    if (volumeSlider) { volumeSlider.value = '100'; updateVolumeLabel(volumeSlider); }
    if (rateSlider)   { rateSlider.value = '100';   updateTempoLabel(rateSlider); }

    // Pipeline : PitchShifter(buffer slicé au startRatio) → GainNode → destination
    const startRatio = Math.min(0.9999, Math.max(0, lastPositions[loopId] || 0));
    const shifter = createShifterAtPosition(ctx, buffer, startRatio);
    shifter.tempo = 1.0;   // Slider tempo (70-130 %) — modifié en live via onRateChange
    shifter.pitch = 1.0;   // FIXÉ : on ne touche JAMAIS le pitch

    const gainNode = ctx.createGain();
    gainNode.gain.value = 1.0;

    shifter.connect(gainNode);
    gainNode.connect(ctx.destination);

    shifter.on('end', () => {
      // Fin naturelle du slice : reset à 0 pour démarrer from scratch au prochain play
      if (activePlayback?.loopId === loopId) stopPlayback({ resetPosition: true });
    });

    activePlayback = { loopId, shifter, gain: gainNode, rafId: null, startRatio };

    // Lance la boucle RAF qui anime le curseur waveform
    startCursorLoop(loopId);

    // UI : bouton playing (le lock sera retiré dans le finally)
    if (btn) { btn.classList.add('playing'); btn.textContent = '■'; }
  } finally {
    // Libère le lock après 60 ms (couvre le fade-out 25 ms de stopPlayback)
    setTimeout(() => {
      playLocks[loopId] = false;
      const btn2 = document.querySelector(`.play-btn[data-id="${loopId}"]`);
      updatePlayBtnState(btn2, loopId);
    }, 60);
  }
}

// ─── Interaction waveform (clic / drag pour seek) ──────────────
// Les events mousemove/mouseup/touchmove/touchend sont globaux (document)
// et partagés entre toutes les cards via l'état waveformDrag. Seul mousedown/
// touchstart est attaché par card.
function getWaveformRatio(wrap, e) {
  const rect = wrap.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const x = clientX - rect.left;
  return Math.max(0, Math.min(1, x / rect.width));
}

function updateWaveformCursor(wrap, ratio) {
  const cursor = wrap.querySelector('.waveform-cursor');
  if (cursor) cursor.style.left = (ratio * 100) + '%';
}

function attachWaveformInteraction(wrap, loopId) {
  function onStart(e) {
    if (e.cancelable) e.preventDefault();
    const wasPlayingBeforeDrag = activePlayback?.loopId === loopId && !!activePlayback.shifter;
    // Pause temporaire pendant le drag pour fluidité + pas de glitch audio
    if (wasPlayingBeforeDrag) stopPlayback();
    const ratio = getWaveformRatio(wrap, e);
    lastPositions[loopId] = ratio;
    updateWaveformCursor(wrap, ratio);
    wrap.classList.add('dragging');
    waveformDrag = { loopId, wrap, wasPlayingBeforeDrag };
  }
  wrap.addEventListener('mousedown',  onStart);
  wrap.addEventListener('touchstart', onStart, { passive: false });
}

// Listeners document-level attachés UNE FOIS au boot (ne pas dupliquer à chaque re-render)
function initGlobalWaveformDragListeners() {
  function onMove(e) {
    if (!waveformDrag) return;
    if (e.cancelable) e.preventDefault();
    const { wrap, loopId } = waveformDrag;
    const ratio = getWaveformRatio(wrap, e);
    lastPositions[loopId] = ratio;
    updateWaveformCursor(wrap, ratio);
  }
  function onEnd() {
    if (!waveformDrag) return;
    const { loopId, wrap, wasPlayingBeforeDrag } = waveformDrag;
    waveformDrag = null;
    wrap.classList.remove('dragging');
    // Si lecture en cours avant le drag : redémarre à la nouvelle position
    // (togglePlay lira lastPositions[loopId] et seek le shifter)
    if (wasPlayingBeforeDrag) togglePlay(loopId);
  }
  document.addEventListener('mousemove',  onMove);
  document.addEventListener('touchmove',  onMove, { passive: false });
  document.addEventListener('mouseup',    onEnd);
  document.addEventListener('touchend',   onEnd);
  document.addEventListener('touchcancel', onEnd);
}
initGlobalWaveformDragListeners();

// Live-update du gain (volume) pendant la lecture
function onVolumeChange(loopId, value) {
  updateVolumeLabel(document.querySelector(`.loop-card[data-id="${loopId}"] .volume-slider`));
  if (activePlayback?.loopId === loopId && activePlayback.gain) {
    activePlayback.gain.gain.value = Number(value) / 100;
  }
}

// Live-update du tempo (sans toucher au pitch — SoundTouchJS time-stretch)
function onRateChange(loopId, value) {
  updateTempoLabel(document.querySelector(`.loop-card[data-id="${loopId}"] .rate-slider`));
  if (activePlayback?.loopId === loopId && activePlayback.shifter) {
    activePlayback.shifter.tempo = Number(value) / 100;
  }
}

function updateVolumeLabel(slider) {
  if (!slider) return;
  const valEl = slider.parentElement.querySelector('.slider-label .value');
  if (valEl) valEl.textContent = slider.value + '%';
}

function updateTempoLabel(slider) {
  if (!slider) return;
  const valEl = slider.parentElement.querySelector('.slider-label .value');
  if (!valEl) return;
  const v = Number(slider.value);
  let suffix = '';
  if (v === 100) suffix = ' (original)';
  else if (v < 100) suffix = ' (ralenti)';
  else suffix = ' (accéléré)';
  valEl.textContent = slider.value + '%' + suffix;
}

        ${(loop.tags || []).length
          ? (loop.tags || []).map(t => `<span class="tag-chip">${esc(t)}</span>`).join('')
          : '<span class="tag-chip empty">+ ajouter une catégorie</span>'}
      </div>

  // Bind events

    b.addEventListener('click', () => openTagEditor(b.dataset.id));
  });
  // Waveform : clic/drag pour seek (souris + touch)
  container.querySelectorAll('.waveform-wrap').forEach(wrap => {
    const canvas = wrap.querySelector('.waveform-canvas');
    const loopId = canvas?.dataset.id;
    if (loopId) {
      attachWaveformInteraction(wrap, loopId);
      // Reflète la position mémorisée si l'utilisateur revient sur la page
      const r = lastPositions[loopId];
      if (typeof r === 'number') updateWaveformCursor(wrap, r);
    }
  });
}

window.onVolumeChange = onVolumeChange;
window.onRateChange   = onRateChange;

// ─── Actions ───────────────────────────────────────────────────
async function deleteLoop(id) {
  const loop = allLoops.find(l => l.id === id);
  if (!loop) return;
  if (!confirm(`Supprimer "${loop.filename}" ?`)) return;
  try {
    if (activePlayback?.loopId === id) stopPlayback();
    delete audioBufferCache[id];
    delete audioBufferPromises[id];
    delete loadStates[id];
    delete playLocks[id];
    delete lastPositions[id];
    await apiDelete(id);
    allLoops = allLoops.filter(l => l.id !== id);
    renderLoops();
    showToast('Loop supprimé');
  } catch (e) {
    showToast('Erreur : ' + e.message, true);
  }
}

async function editBpm(id) {
  const loop = allLoops.find(l => l.id === id);
  if (!loop) return;
  const current = loop.bpm == null ? '' : String(loop.bpm);
  const ans = prompt('BPM (laisser vide si inconnu) :', current);
  if (ans === null) return; // cancel
  const trimmed = String(ans).trim();
  const newBpm = trimmed === '' ? null : Number(trimmed);
  if (newBpm !== null && (!Number.isFinite(newBpm) || newBpm < 20 || newBpm > 300)) {
    showToast('BPM invalide (20-300 ou vide)', true);
    return;
  }
  try {
    const res = await apiPatch(id, { bpm: newBpm });
    Object.assign(loop, res.loop);
    renderLoops();
    showToast('BPM mis à jour');
  } catch (e) {
    showToast('Erreur : ' + e.message, true);
  }
}

// ─── Édition inline du nom ─────────────────────────────────────
async function editLoopName(loopId, el) {
  if (!el || el.querySelector('input')) return; // déjà en édition
  const loop = allLoops.find(l => l.id === loopId);
  if (!loop) return;
  const originalDisplay = loop.filename;
  // Sépare l'extension .mp3 pour la rajouter automatiquement à la sauvegarde
  const extMatch = originalDisplay.match(/\.mp3$/i);
  const ext = extMatch ? extMatch[0] : '';
  const baseName = ext ? originalDisplay.slice(0, -ext.length) : originalDisplay;

  el.textContent = '';
  el.classList.add('editing');
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'name-edit';
  input.value = baseName;
  input.maxLength = 200;
  el.appendChild(input);
  input.focus();
  input.select();

  let cancelled = false;
  let settled = false;

  function restore() {
    el.classList.remove('editing');
    el.textContent = originalDisplay;
    el.title = `${originalDisplay} — clic pour renommer`;
  }

  async function commit() {
    if (settled) return;
    settled = true;
    if (cancelled) { restore(); return; }
    const newBase = input.value.trim();
    if (newBase === '') {
      restore();
      showToast('Le nom ne peut pas être vide', true);
      return;
    }
    // Reconstruit le filename : ajoute .mp3 si l'utilisateur n'a pas inclus une extension
    const hasExt = /\.[a-z0-9]{2,5}$/i.test(newBase);
    const newFilename = hasExt ? newBase : (newBase + (ext || '.mp3'));
    if (newFilename === originalDisplay) {
      restore();
      return;
    }
    input.disabled = true;
    try {
      const res = await apiPatch(loopId, { filename: newFilename });
      Object.assign(loop, res.loop);
      el.classList.remove('editing');
      el.textContent = loop.filename;
      el.title = `${loop.filename} — clic pour renommer`;
      showToast('Nom mis à jour');
    } catch (e) {
      restore();
      showToast('Impossible de modifier le nom : ' + e.message, true);
    }
  }

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      input.blur();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      cancelled = true;
      input.blur();
    }
  });
}
window.editLoopName = editLoopName;

function openTagEditor(loopId) {
  const loop = allLoops.find(l => l.id === loopId);
  if (!loop) return;
  const card = document.querySelector(`.loop-card[data-id="${loopId}"]`);
  if (!card) return;
  // Si déjà ouvert : ne rien faire
  if (card.querySelector('.tag-dropdown')) return;

  const currentTags = new Set(loop.tags || []);
  const dropdown = document.createElement('div');
  dropdown.className = 'tag-dropdown';
  dropdown.innerHTML = `
    ${allCategories.map(c => `
      <label><input type="checkbox" value="${esc(c)}" ${currentTags.has(c) ? 'checked' : ''}> ${esc(c)}</label>
    `).join('')}
    <div class="dd-actions">
      <button type="button" class="btn-cancel">Annuler</button>
      <button type="button" class="btn-save">OK</button>
    </div>
  `;
  // Insert after tags-area
  const area = card.querySelector('.tags-area');
  area.insertAdjacentElement('afterend', dropdown);

  dropdown.querySelector('.btn-cancel').addEventListener('click', () => {
    dropdown.remove();
  });
  dropdown.querySelector('.btn-save').addEventListener('click', async () => {
    const checked = [...dropdown.querySelectorAll('input[type="checkbox"]:checked')]
      .map(cb => cb.value);
    dropdown.remove();
    try {
      const res = await apiPatch(loopId, { tags: checked });
      Object.assign(loop, res.loop);
      if (Array.isArray(res.categories)) allCategories = res.categories;
      renderCategories();
      renderLoops();
      showToast('Tags mis à jour');
    } catch (e) {
      showToast('Erreur : ' + e.message, true);
    }
  });
}

// ─── Upload flow ───────────────────────────────────────────────
const uploadZone = document.getElementById('upload-zone');
const fileInput  = document.getElementById('file-input');

uploadZone.addEventListener('dragover', (e) => {
  e.preventDefault(); uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', (e) => {
  if (!uploadZone.contains(e.relatedTarget)) uploadZone.classList.remove('drag-over');
});
uploadZone.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files?.length) handleFilesSelected(e.dataTransfer.files);
});
fileInput.addEventListener('change', (e) => {
  if (e.target.files?.length) handleFilesSelected(e.target.files);
  e.target.value = ''; // reset
});

async function handleFilesSelected(fileList) {
  const files = [...fileList].filter(f => /\.(mp3)$/i.test(f.name) || f.type.includes('mpeg'));
  if (!files.length) {
    showToast('Aucun MP3 valide trouvé', true);
    return;
  }
  // Vérifier taille
  for (const f of files) {
    if (f.size > 20 * 1024 * 1024) {
      showToast(`"${f.name}" dépasse 20 Mo`, true);
      return;
    }
  }
  // Lire la durée audio en local
  for (const f of files) {
    f._duration = await getAudioDuration(f).catch(() => 0);
  }
  pendingUploadFiles = files;
  openUploadModal(files);
}

function getAudioDuration(file) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const a = new Audio();
    a.preload = 'metadata';
    a.onloadedmetadata = () => { URL.revokeObjectURL(url); resolve(a.duration); };
    a.onerror = () => { URL.revokeObjectURL(url); resolve(0); };
    a.src = url;
  });
}

function openUploadModal(files) {
  document.getElementById('upload-files-list').innerHTML = files.map(f =>
    `<div>${esc(f.name)} — ${fmtSize(f.size)} (${fmtDuration(f._duration)})</div>`
  ).join('');
  document.getElementById('upload-bpm').value = '';
  // Render categories multi-select
  const catWrap = document.getElementById('upload-cats');
  catWrap.innerHTML = allCategories.map(c =>
    `<label><input type="checkbox" value="${esc(c)}"> ${esc(c)}</label>`
  ).join('');
  document.getElementById('upload-progress').style.display = 'none';
  document.getElementById('upload-bar').style.width = '0%';
  document.getElementById('upload-modal').classList.remove('hidden');
}

document.getElementById('upload-cancel').addEventListener('click', () => {
  document.getElementById('upload-modal').classList.add('hidden');
  pendingUploadFiles = [];
});

document.getElementById('upload-submit').addEventListener('click', async () => {
  const submitBtn = document.getElementById('upload-submit');
  const bpmRaw = document.getElementById('upload-bpm').value.trim();
  const bpm = bpmRaw === '' ? null : Number(bpmRaw);
  if (bpm !== null && (!Number.isFinite(bpm) || bpm < 20 || bpm > 300)) {
    showToast('BPM invalide (20-300 ou vide)', true);
    return;
  }
  const tags = [...document.querySelectorAll('#upload-cats input[type="checkbox"]:checked')]
    .map(cb => cb.value);

  submitBtn.disabled = true;
  document.getElementById('upload-progress').style.display = 'block';
  const total = pendingUploadFiles.length;
  let done = 0;
  let lastError = null;

  for (const f of pendingUploadFiles) {
    try {
      const res = await apiUpload(f, { bpm, tags, durationSec: f._duration });
      allLoops.push(res.loop);
      if (Array.isArray(res.categories)) allCategories = res.categories;
    } catch (e) {
      lastError = e.message;
      console.error('Upload failed for', f.name, e);
    }
    done++;
    document.getElementById('upload-bar').style.width = (done / total * 100) + '%';
  }

  submitBtn.disabled = false;
  document.getElementById('upload-modal').classList.add('hidden');
  pendingUploadFiles = [];
  renderCategories();
  renderLoops();
  if (lastError) showToast(`${done - 1}/${total} importés. Dernière erreur : ${lastError}`, true);
  else showToast(`${total} loop${total > 1 ? 's' : ''} importé${total > 1 ? 's' : ''} ✓`);
});

// ─── Add category modal ────────────────────────────────────────
function openCatModal() {
  document.getElementById('cat-name').value = '';
  document.getElementById('cat-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('cat-name').focus(), 50);
}
document.getElementById('cat-cancel').addEventListener('click', () => {
  document.getElementById('cat-modal').classList.add('hidden');
});
document.getElementById('cat-submit').addEventListener('click', async () => {
  const name = document.getElementById('cat-name').value.trim();
  if (!name) { showToast('Nom requis', true); return; }
  if (name.length > 30) { showToast('Max 30 caractères', true); return; }
  try {
    const res = await apiAddCategory(name);
    allCategories = res.categories;
    document.getElementById('cat-modal').classList.add('hidden');
    renderCategories();
    showToast('Catégorie ajoutée');
  } catch (e) {
    showToast('Erreur : ' + e.message, true);
  }
});
document.getElementById('cat-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('cat-submit').click(); }
  if (e.key === 'Escape') { e.preventDefault(); document.getElementById('cat-cancel').click(); }
});

// ─── Boot ──────────────────────────────────────────────────────
async function boot() {
  try {
    const data = await apiList();
    allLoops = data.loops || [];
    allCategories = data.categories || [];
    renderCategories();
    renderLoops();
  } catch (e) {
    document.getElementById('loops-container').innerHTML =
      `<div class="error-state"><p>Impossible de charger les loops : ${esc(e.message)}</p>
       <button type="button" class="btn-primary" style="margin-top:12px;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:inherit;" onclick="boot()">Réessayer</button></div>`;
  }
}
window.boot = boot;
boot();
</script>
