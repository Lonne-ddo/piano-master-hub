<!DOCTYPE html>
<html lang="fr">
<head>
    <script>
    (function(){
        if (localStorage.getItem('mh_admin') !== '4697') {
            window.location.replace('/admin/');
        }
    })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Élèves — Master Hub Admin</title>
    <meta name="theme-color" content="#09090f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MH Admin">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --v:       #8B6FE8;
            --v-dim:   #8B6FE826;
            --v-soft:  rgba(139, 111, 232, 0.15);
            --v-border: rgba(139, 111, 232, 0.4);
            --bg0:     #09090f;
            --bg1:     #0f0e18;
            --bg2:     #161524;
            --bg3:     #1e1c30;
            --text1:   #eeeaf8;
            --text2:   #9d9ab5;
            --text3:   #5a5870;
            --border:  #25233a;
            --green:   #5ecb8b;
            --green-soft: rgba(94, 203, 139, 0.15);
            --amber:   #f0b429;
            --red:     #e05c6b;
            --red-soft: rgba(224, 92, 107, 0.15);
        }

        html, body { min-height: 100%; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg0);
            color: var(--text1);
            min-height: 100vh; min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        button:focus-visible, input:focus-visible, select:focus-visible, a:focus-visible {
            outline: 2px solid var(--v);
            outline-offset: 2px;
            border-radius: 6px;
        }

        .app {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px 60px;
        }

        /* ── Header ───────────────────────────────────────── */
        .app-header {
            display: flex; align-items: center; gap: 16px;
            flex-wrap: wrap;
            padding-bottom: 18px;
            margin-bottom: 22px;
            border-bottom: 1px solid var(--border);
        }
        .logo-block { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        .logo-icon {
            width: 44px; height: 44px;
            background: var(--v);
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .logo-icon svg { width: 28px; height: 28px; }
        .logo-text {
            font-size: 1.05rem; font-weight: 700; color: var(--text1);
            letter-spacing: -0.01em; line-height: 1.1;
        }
        .logo-sub {
            font-size: 0.78rem; color: var(--text2); margin-top: 2px;
        }
        .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .hbtn {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text1);
            font-family: inherit;
            font-size: 0.85rem; font-weight: 500;
            padding: 9px 14px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px;
            transition: background 0.18s, border-color 0.18s;
        }
        .hbtn:hover { background: var(--bg3); border-color: var(--v-dim); }

        /* ── Toolbar (counter + filters + add) ────────────── */
        .toolbar {
            display: flex; align-items: center; justify-content: space-between;
            gap: 16px; flex-wrap: wrap;
            margin-bottom: 18px;
        }
        .counter {
            font-size: 0.92rem;
            color: var(--text2);
        }
        .counter strong { color: var(--text1); }
        .counter .stats {
            color: var(--text3); margin-left: 8px;
            font-family: 'DM Mono', monospace; font-size: 0.82rem;
        }

        .filters {
            display: flex; gap: 6px;
        }
        .filter-chip {
            background: var(--bg1);
            border: 1px solid var(--border);
            color: var(--text2);
            font-family: inherit;
            font-size: 0.82rem; font-weight: 500;
            padding: 8px 14px;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .filter-chip:hover { background: var(--bg2); color: var(--text1); }
        .filter-chip.active {
            background: var(--v-soft); color: var(--v);
            border-color: var(--v);
        }

        .btn-add {
            background: var(--v); color: #fff;
            border: none;
            font-family: inherit;
            font-size: 0.9rem; font-weight: 600;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 6px;
            transition: background 0.18s, transform 0.12s;
        }
        .btn-add:hover { background: #9b80f0; }
        .btn-add:active { transform: scale(0.97); }

        /* ── Table élèves ──────────────────────────────── */
        .eleves-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .eleves-table thead {
            background: var(--bg2);
        }
        .eleves-table th {
            text-align: left;
            padding: 12px 14px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text2);
            border-bottom: 1px solid var(--border);
        }
        .eleves-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            vertical-align: middle;
        }
        .eleves-table tbody tr:last-child td { border-bottom: none; }
        .eleves-table tbody tr {
            transition: background 0.12s;
        }
        .eleves-table tbody tr:hover { background: var(--bg2); }

        .col-slug, .col-date {
            font-family: 'DM Mono', monospace;
            font-size: 0.82rem;
            color: var(--text2);
        }
        .col-email { color: var(--text2); font-size: 0.85rem; }
        .col-actions { white-space: nowrap; text-align: right; }

        .statut-chip {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.74rem;
            font-weight: 600;
        }
        .statut-chip.actif {
            background: var(--green-soft); color: var(--green);
        }
        .statut-chip.archive {
            background: rgba(255,255,255,0.05); color: var(--text3);
        }

        .row-action {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
            font-family: inherit;
            font-size: 0.85rem;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 4px;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .row-action:hover {
            background: var(--bg3); color: var(--text1);
            border-color: var(--v-dim);
        }
        .row-action.danger:hover {
            background: var(--red-soft); color: var(--red);
            border-color: var(--red);
        }

        /* ── Empty state ──────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 12px;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-state .title { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; }
        .empty-state .sub { font-size: 0.88rem; color: var(--text2); margin-bottom: 18px; }

        /* ── Loading ──────────────────────────────────── */
        .loading {
            text-align: center; padding: 60px 20px;
            color: var(--text2); font-size: 0.9rem;
        }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid var(--border);
            border-top-color: var(--v);
            border-radius: 50%;
            margin: 0 auto 12px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Modale ──────────────────────────────────── */
        .modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            display: none;
            align-items: center; justify-content: center;
            z-index: 100;
            padding: 20px;
        }
        .modal-backdrop.is-visible { display: flex; }

        .modal {
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            max-width: 480px;
            width: 100%;
            max-height: calc(100vh - 40px);
            overflow-y: auto;
        }
        .modal-title {
            font-size: 1.15rem; font-weight: 700;
            color: var(--text1);
            margin-bottom: 4px;
        }
        .modal-sub {
            font-size: 0.85rem; color: var(--text2);
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 14px; }
        .form-label {
            display: block;
            font-size: 0.78rem; font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 6px;
        }
        .form-input {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text1);
            font-family: inherit;
            font-size: 0.92rem;
            padding: 10px 12px;
            border-radius: 8px;
            transition: border-color 0.15s, background 0.15s;
        }
        .form-input:focus { border-color: var(--v); background: var(--bg3); outline: none; }
        .form-input.mono { font-family: 'DM Mono', monospace; font-size: 0.88rem; }
        .form-input[readonly] { opacity: 0.6; cursor: not-allowed; }
        .form-hint {
            font-size: 0.74rem; color: var(--text3);
            margin-top: 4px;
        }
        .form-error {
            font-size: 0.78rem; color: var(--red);
            margin-top: 4px;
        }

        .form-radio-row {
            display: flex; gap: 8px;
        }
        .form-radio {
            flex: 1;
            position: relative;
        }
        .form-radio input { display: none; }
        .form-radio label {
            display: block;
            padding: 10px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-align: center;
            font-size: 0.88rem;
            color: var(--text2);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .form-radio input:checked + label {
            background: var(--v-soft);
            border-color: var(--v);
            color: var(--v);
            font-weight: 600;
        }

        .modal-actions {
            display: flex; gap: 10px;
            justify-content: flex-end;
            margin-top: 22px;
        }
        .btn-cancel {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text2);
            font-family: inherit;
            font-size: 0.9rem;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-cancel:hover { background: var(--bg3); color: var(--text1); }
        .btn-save {
            background: var(--v);
            border: none;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem; font-weight: 600;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-save:hover { background: #9b80f0; }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Toast ──────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text1);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.88rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            opacity: 0; pointer-events: none;
            transition: opacity 0.22s, transform 0.22s;
            z-index: 200;
            max-width: calc(100% - 32px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: var(--red); color: var(--red); }
        .toast.success { border-color: var(--green); color: var(--green); }

        /* ── Responsive ──────────────────────────────── */
        @media (max-width: 720px) {
            .toolbar { flex-direction: column; align-items: stretch; gap: 10px; }
            .filters { justify-content: center; }
            .eleves-table { font-size: 0.85rem; }
            .eleves-table th, .eleves-table td { padding: 10px 8px; }
            .col-email, .col-date-fin { display: none; }
        }
        @media (max-width: 480px) {
            .col-date-debut { display: none; }
            .modal { padding: 18px 16px; }
        }
    </style>
</head>
<body>

    <div class="app">

        <header class="app-header">
            <div class="logo-block">
                <a href="/admin/outils.html" class="hbtn" aria-label="Retour outils">&larr;</a>
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <div>
                    <div class="logo-text">Élèves</div>
                    <div class="logo-sub">Gestion CRUD · KV MASTERHUB_STUDENTS</div>
                </div>
            </div>
            <div class="header-actions">
                <button class="hbtn" id="btn-refresh" type="button">↻ Refresh</button>
            </div>
        </header>

        <div class="toolbar">
            <div class="counter" id="counter">Chargement…</div>
            <div class="filters" id="filters">
                <button type="button" class="filter-chip active" data-filter="all">Tous</button>
                <button type="button" class="filter-chip" data-filter="actif">Actifs</button>
                <button type="button" class="filter-chip" data-filter="archive">Archivés</button>
            </div>
            <button type="button" class="btn-add" id="btn-add">+ Ajouter un élève</button>
        </div>

        <div id="content">
            <div class="loading">
                <div class="spinner"></div>
                Chargement des élèves…
            </div>
        </div>

    </div>

    <!-- Modale formulaire -->
    <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal">
            <div class="modal-title" id="modal-title">Nouvel élève</div>
            <div class="modal-sub" id="modal-sub">Crée un nouveau profil élève</div>

            <form id="eleve-form" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="f-slug">Slug</label>
                    <input type="text" class="form-input mono" id="f-slug" name="slug" required
                           pattern="[a-z0-9_-]{2,30}"
                           placeholder="japhet, messon..." />
                    <div class="form-hint">Identifiant URL (lettres minuscules, chiffres, _ ou -). 2-30 caractères. Immuable une fois créé.</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="f-nom">Nom</label>
                    <input type="text" class="form-input" id="f-nom" name="nom" required
                           minlength="2" maxlength="50"
                           placeholder="Japhet" />
                </div>

                <div class="form-group">
                    <label class="form-label" for="f-email">Email <span style="text-transform:none;font-weight:400;color:var(--text3)">(optionnel)</span></label>
                    <input type="email" class="form-input" id="f-email" name="email"
                           placeholder="japhet@example.com" />
                </div>

                <div class="form-group">
                    <label class="form-label" for="f-date-debut">Date début</label>
                    <input type="date" class="form-input mono" id="f-date-debut" name="date_debut" />
                </div>

                <div class="form-group">
                    <label class="form-label" for="f-date-fin">Date fin</label>
                    <input type="date" class="form-input mono" id="f-date-fin" name="date_fin" />
                </div>

                <div class="form-group">
                    <span class="form-label">Statut</span>
                    <div class="form-radio-row">
                        <div class="form-radio">
                            <input type="radio" name="statut" id="f-statut-actif" value="actif" checked />
                            <label for="f-statut-actif">Actif</label>
                        </div>
                        <div class="form-radio">
                            <input type="radio" name="statut" id="f-statut-archive" value="archive" />
                            <label for="f-statut-archive">Archivé</label>
                        </div>
                    </div>
                </div>

                <div class="form-error" id="form-error" style="display:none"></div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="btn-cancel">Annuler</button>
                    <button type="submit" class="btn-save" id="btn-save">Enregistrer</button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="/admin/eleves.js"></script>

</body>
</html>
