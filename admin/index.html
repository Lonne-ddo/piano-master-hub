<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Élèves — Master Hub Admin</title>
  <meta name="theme-color" content="#09090f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MH Admin">
  <link rel="icon" id="app-icon">
  <link rel="apple-touch-icon" id="app-touch-icon" sizes="180x180">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --v:       #8B6FE8;
      --v-dim:   #8B6FE826;
      --v-soft:  #6b54c4;
      --bg0:     #09090f;
      --bg1:     #0f0e18;
      --bg2:     #161524;
      --bg3:     #1e1c30;
      --text1:   #eeeaf8;
      --text2:   #9d9ab5;
      --text3:   #5a5870;
      --border:  #25233a;
      --green:   #5ecb8b;
      --amber:   #f0b429;
      --red:     #e05c6b;
    }

    html, body { min-height: 100%; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg0);
      color: var(--text1);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Login overlay ─────────────────────────────────────── */
    #login-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(9, 9, 15, 0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #login-overlay.hidden { display: none; }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .login-card .logo { width: 56px; height: 56px; }
    .login-card h2 {
      font-size: 1.2rem; font-weight: 700;
      color: var(--text1); letter-spacing: -0.01em;
    }
    .login-card form {
      width: 100%; display: flex; flex-direction: column;
      gap: 10px; margin-top: 8px;
    }
    .login-card input {
      width: 100%;
      background: var(--bg2); color: var(--text1);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; font-size: 1rem; font-family: inherit;
      min-height: 46px; outline: none;
      transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: var(--v); }
    .login-card button {
      width: 100%;
      background: var(--v); color: #fff; border: none;
      border-radius: 8px; padding: 12px 14px;
      font-size: 0.95rem; font-weight: 600; font-family: inherit;
      min-height: 46px; cursor: pointer;
      transition: background 0.15s;
    }
    .login-card button:hover { background: var(--v-soft); }
    .login-error {
      font-size: 0.85rem; color: var(--red);
      text-align: center; min-height: 1.2em;
    }

    /* ── Top-right nav ─────────────────────────────────────── */
    .top-nav {
      position: fixed;
      top: 16px; right: 16px;
      z-index: 50;
      display: flex; gap: 6px;
    }
    .top-nav a, .top-nav button {
      background: var(--bg1);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: inherit;
      font-size: 11.5px;
      padding: 7px 11px;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .top-nav a:hover, .top-nav button:hover {
      border-color: var(--v);
      color: var(--text1);
    }

    /* ── App shell ─────────────────────────────────────────── */
    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 24px 60px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 0 4px;
    }
    .app-header .logo-icon {
      width: 40px; height: 40px;
      background: var(--v);
      border-radius: 10px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .app-header .logo-icon svg { width: 26px; height: 26px; display: block; }
    .app-header .logo-text {
      font-size: 15px; font-weight: 700;
      color: var(--text1); letter-spacing: -.01em;
    }
    .app-header .logo-sub {
      font-size: 10.5px; color: var(--text3);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase; letter-spacing: .08em;
    }

    /* ── Tab bar ───────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 8px 4px 4px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-eleve {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border-radius: 10px;
      cursor: pointer;
      background: none; border: none; color: inherit;
      font-family: inherit;
      transition: transform .15s;
      flex-shrink: 0;
      min-width: 64px;
    }

    .tab-circle {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--bg2);
      border: 1.5px solid var(--border);
      color: var(--text2);
      display: grid; place-items: center;
      font-size: 18px; font-weight: 700;
      transition: background .15s, border-color .15s, color .15s, transform .15s;
    }
    .tab-name {
      font-size: 12px;
      color: var(--text2);
      font-weight: 500;
      transition: color .15s;
    }

    .tab-eleve:hover .tab-circle {
      border-color: var(--v-soft);
      color: var(--v);
    }
    .tab-eleve.active .tab-circle {
      background: var(--v);
      border-color: var(--v);
      color: #fff;
      transform: scale(1.06);
    }
    .tab-eleve.active .tab-name {
      color: var(--text1);
      font-weight: 600;
    }

    .tab-spacer { flex: 1; min-width: 8px; }

    .sync-all-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 10px 14px;
      background: var(--bg1);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 10px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color .15s, color .15s;
    }
    .sync-all-btn:hover { border-color: var(--v); color: var(--text1); }
    .sync-all-btn[disabled] { opacity: 0.6; cursor: wait; }
    .sync-all-btn .icon { font-size: 14px; line-height: 1; }

    @media (max-width: 768px) {
      .tab-circle { width: 56px; height: 56px; font-size: 20px; }
      .tab-eleve { min-width: 72px; }
    }
    @media (max-width: 500px) {
      .sync-all-btn .label { display: none; }
      .sync-all-btn { padding: 10px 12px; }
    }

    /* ── Context bar ───────────────────────────────────────── */
    .ctx-bar {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.5;
      padding: 8px 6px 0;
      min-height: 1.8em;
    }
    .ctx-bar strong {
      color: var(--text1);
      font-weight: 700;
    }
    .ctx-bar .sep {
      color: var(--text3);
      margin: 0 6px;
    }
    .ctx-bar .pct {
      color: var(--v);
      font-weight: 600;
      font-family: 'DM Mono', monospace;
    }

    /* ── Cards ─────────────────────────────────────────────── */
    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    @media (max-width: 900px) {
      .card-grid { grid-template-columns: 1fr; gap: 14px; }
    }

    .card {
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--text3);
      font-family: 'DM Mono', monospace;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-subtitle {
      font-size: 13px;
      color: var(--v);
      font-family: 'DM Mono', monospace;
      margin-top: -6px;
    }

    .card-section { display: flex; flex-direction: column; gap: 6px; }
    .card-section-label {
      font-size: 10.5px;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-family: 'DM Mono', monospace;
      margin-bottom: 2px;
    }

    .bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .bullets li {
      font-size: 13.5px;
      color: var(--text1);
      padding-left: 14px;
      position: relative;
      line-height: 1.45;
    }
    .bullets li::before {
      content: '–';
      position: absolute;
      left: 0;
      color: var(--v);
    }
    .bullets.muted li { color: var(--text2); font-size: 13px; }
    .bullets.muted li::before { color: var(--text3); }

    .card .empty-note {
      font-size: 12.5px;
      color: var(--text3);
      font-style: italic;
    }

    /* ── Toggle previous sessions ──────────────────────────── */
    .toggle-link {
      align-self: flex-start;
      margin-top: 4px;
      color: var(--v);
      font-size: 12.5px;
      cursor: pointer;
      text-decoration: none;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
    }
    .toggle-link:hover { color: var(--v-soft); text-decoration: underline; }

    .previous-sessions {
      margin-top: 6px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      display: none;
      flex-direction: column;
      gap: 16px;
    }
    .previous-sessions.open { display: flex; }

    .prev-session-item {
      display: flex;
      gap: 12px;
    }
    .prev-session-item .dot {
      width: 24px; height: 24px; border-radius: 50%;
      background: var(--bg3);
      border: 1.5px solid var(--border);
      display: grid; place-items: center;
      color: var(--text3);
      font-size: 10px; font-family: 'DM Mono', monospace;
      flex-shrink: 0;
    }
    .prev-session-item .body { flex: 1; min-width: 0; }
    .prev-session-item .date {
      font-size: 11.5px; color: var(--text3);
      font-family: 'DM Mono', monospace;
      margin-bottom: 4px;
    }
    .prev-session-item .focus {
      font-size: 13px; color: var(--text1);
      font-weight: 600; margin-bottom: 6px;
    }

    /* ── Théorie grid ──────────────────────────────────────── */
    .theory-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 6px;
    }
    .theory-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 7px;
      background: var(--bg2); border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color .15s;
    }
    .theory-item:hover { border-color: var(--text3); }
    .theory-check {
      width: 16px; height: 16px; border-radius: 4px;
      display: grid; place-items: center;
      font-size: 9.5px;
      flex-shrink: 0;
    }
    .theory-item.done        .theory-check { background: #5ecb8b1a; color: var(--green); }
    .theory-item.todo        .theory-check { background: var(--bg1); color: var(--text3); border: 1px solid var(--border); }
    .theory-item.in-progress .theory-check { background: var(--v-dim); color: var(--v); }
    .theory-label { font-size: 12px; color: var(--text2); line-height: 1.3; }
    .theory-item.done .theory-label { color: var(--text1); }

    /* ── Link list (canaux + doc) ──────────────────────────── */
    .link-list { display: flex; flex-direction: column; gap: 6px; }
    .link-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      text-decoration: none;
      transition: border-color .15s, background .15s;
    }
    .link-item:hover { border-color: var(--v); background: var(--v-dim); }
    .link-icon {
      width: 26px; height: 26px; border-radius: 7px;
      display: grid; place-items: center;
      font-size: 13px; flex-shrink: 0;
    }
    .link-icon.tg { background: #229ED91a; }
    .link-icon.dc { background: #5865F21a; }
    .link-icon.bz { background: var(--v-dim); }
    .link-icon.dr { background: #f0b4291a; }
    .link-info { flex: 1; min-width: 0; }
    .link-name { font-size: 13px; font-weight: 600; color: var(--text1); }
    .link-sub {
      font-size: 11px; color: var(--text3);
      font-family: 'DM Mono', monospace;
      margin-top: 1px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .link-arrow { color: var(--text3); font-size: 12px; flex-shrink: 0; }

    /* ── Dates block ───────────────────────────────────────── */
    .dates-block {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding-top: 12px;
      margin-top: 4px;
      border-top: 1px solid var(--border);
    }
    .date-block {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .date-label {
      font-size: 10px; color: var(--text3);
      text-transform: uppercase; letter-spacing: .08em;
      font-family: 'DM Mono', monospace;
      margin-bottom: 4px;
    }
    .date-value {
      font-size: 13px; font-weight: 600; color: var(--text1);
    }
    .date-editable {
      cursor: pointer;
      border-bottom: 1px dashed rgba(139,111,232,0.4);
      transition: border-color 0.15s, color 0.15s;
      display: inline-block;
    }
    .date-editable:hover {
      border-bottom-color: var(--v);
      color: var(--v);
    }

    /* ── Toast ─────────────────────────────────────────────── */
    .pk-toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1a24; color: #eeeaf8;
      border: 1px solid rgba(139,111,232,0.4);
      padding: 10px 18px; border-radius: 10px;
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      z-index: 9999;
      opacity: 0; transition: opacity 0.2s;
    }
    .pk-toast.show { opacity: 1; }

    /* ── Empty state / loader / error ──────────────────────── */
    .empty-state, .loader, .error-state {
      padding: 50px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--text3);
      text-align: center;
    }
    .empty-state .ns-icon { font-size: 40px; opacity: .3; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }
    .loader p { font-size: 13px; }
    .loader .sub { font-size: 11px; color: var(--text3); opacity: .6; }
    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--v);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state .warn { font-size: 32px; }
    .error-state .msg {
      font-size: 14px; color: var(--text2); max-width: 420px;
      line-height: 1.5;
    }
    .error-state .details {
      font-size: 11px; font-family: 'DM Mono', monospace;
      color: var(--text3); max-width: 420px;
      word-break: break-all;
    }
    .error-state .retry-btn {
      margin-top: 8px;
      padding: 8px 16px;
      background: var(--v);
      color: #fff; border: none; border-radius: 8px;
      cursor: pointer; font-size: 13px;
      font-family: inherit; font-weight: 600;
    }
    .error-state .retry-btn:hover { background: var(--v-soft); }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Mobile ────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .app { padding: 18px 14px 60px; }
      .top-nav { top: 12px; right: 12px; }
      .top-nav a, .top-nav button { font-size: 10.5px; padding: 6px 9px; }
      .card { padding: 16px; }
      .ctx-bar { font-size: 13px; }
      .app-header { padding-top: 32px; }
    }
  </style>
</head>
<body>

<!-- ═══ SCRIPTS ═══════════════════════════════════════════════ -->
<script>
// ─── App logic ─────────────────────────────────────────────────
const STUDENT_LIST = [
  { id: 'japhet', nom: 'Japhet' },
  { id: 'messon', nom: 'Messon' },
  { id: 'dexter', nom: 'Dexter' },
  { id: 'tara',   nom: 'Tara' }
];

let activeId = null;
let clientCache = {};

function authHeaders() {
  return { 'x-admin-secret': localStorage.getItem('mh_admin') || '' };
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

const MONTHS_SHORT = ['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
const MONTHS_LONG  = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

function fmtDateShort(str) {
  if (!str) return '—';
  const m = String(str).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!m) return str;
  const mi = parseInt(m[2], 10) - 1;
  if (mi < 0 || mi > 11) return str;
  return `${parseInt(m[1], 10)} ${MONTHS_SHORT[mi]}`;
}

function fmtDateLong(str) {
  if (!str) return '—';
  const m = String(str).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (!m) return str;
  const mi = parseInt(m[2], 10) - 1;
  if (mi < 0 || mi > 11) return str;
  return `${parseInt(m[1], 10)} ${MONTHS_LONG[mi]} ${m[3]}`;
}

function renderTabs() {
  const bar = document.getElementById('tabBar');
  const tabs = STUDENT_LIST.map(s => `
    <button type="button" class="tab-eleve ${activeId === s.id ? 'active' : ''}" onclick="selectStudent('${s.id}')">
      <div class="tab-circle">${escapeHtml(s.nom[0])}</div>
      <div class="tab-name">${escapeHtml(s.nom)}</div>
    </button>
  `).join('');
  const syncBtn = `
    <span class="tab-spacer"></span>
    <button type="button" class="sync-all-btn" id="syncAllBtn" onclick="syncFromGDocs()" title="Sync depuis Google Docs">
      <span class="icon">&#128260;</span><span class="label">Sync All</span>
    </button>
  `;
  bar.innerHTML = tabs + syncBtn;
}

function renderCtx(s) {
  const ctx = document.getElementById('ctxBar');
  if (!s) { ctx.innerHTML = ''; return; }
  const seances = s.seances || [];
  const sessionCount = s.sessionCount || seances.length;
  const debut = fmtDateShort(s.premier_cours);
  const fin = fmtDateShort(s.fin_prevue);
  const progression = typeof s.progression === 'number' ? s.progression
    : (s.theorie?.length ? Math.round(s.theorie.filter(t => t.statut === 'done').length / s.theorie.length * 100) : 0);
  ctx.innerHTML = `
    <strong>${escapeHtml(s.nom)}</strong>
    <span class="sep">·</span> ${sessionCount} cours
    <span class="sep">·</span> début ${escapeHtml(debut)}
    <span class="sep">·</span> fin ${escapeHtml(fin)}
    <span class="sep">·</span> progression <span class="pct">${progression}%</span>
  `;
}

function renderEmpty() {
  document.getElementById('ctxBar').innerHTML = '';
  document.getElementById('mainContent').innerHTML = `
    <div class="empty-state">
      <div class="ns-icon">&#127925;</div>
      <p>Choisis un élève en haut pour voir son profil</p>
    </div>
  `;
}

function showLoader(nom) {
  document.getElementById('ctxBar').innerHTML = `<strong>${escapeHtml(nom)}</strong> <span class="sep">·</span> chargement…`;
  document.getElementById('mainContent').innerHTML = `
    <div class="loader">
      <div class="spinner"></div>
      <p>Chargement du profil de ${escapeHtml(nom)}…</p>
      <p class="sub">Lecture du Google Doc + parsing Gemini</p>
    </div>
  `;
}

function showError(message, details) {
  document.getElementById('ctxBar').innerHTML = '';
  document.getElementById('mainContent').innerHTML = `
    <div class="error-state">
      <div class="warn">⚠️</div>
      <p class="msg">${escapeHtml(message)}</p>
      ${details ? `<p class="details">${escapeHtml(details)}</p>` : ''}
      <button type="button" class="retry-btn" onclick="selectStudent('${activeId}', true)">Réessayer</button>
    </div>
  `;
}

function renderProfile(s) {
  renderCtx(s);

  const seances = s.seances || [];
  const theorie = s.theorie || [];
  const repertoire = s.repertoire || [];

  // Dernière séance = dernier index (seances triées ancienne → récente par les workers)
  const lastIdx = seances.length - 1;
  const last = lastIdx >= 0 ? seances[lastIdx] : null;
  const lastDateLong = last ? (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(String(last.date)) ? fmtDateLong(last.date) : last.date) : '—';
  const lastContenu = last ? (last.contenu || []) : [];
  const previousSeances = lastIdx > 0 ? seances.slice(0, lastIdx) : [];

  // À préparer
  const theorieInProgress = theorie.filter(t => t.statut === 'in-progress');
  const lastDevoirs = last && Array.isArray(last.devoirs) ? last.devoirs : [];
  const devoirsRecurrents = lastDevoirs.length > 0 ? lastDevoirs : ['Tonedear (ear training)'];
  const repertoireActif = repertoire.filter(r => r.statut === 'en-cours');

  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="card-grid">
      <!-- ══ CARD 1 : DERNIÈRE SÉANCE ═══════════════════════════ -->
      <div class="card">
        <div class="card-title">📋 Dernière séance</div>
        <div class="card-subtitle">${escapeHtml(lastDateLong)}${last && last.focus ? ' · ' + escapeHtml(last.focus) : ''}</div>
        ${lastContenu.length === 0
          ? '<p class="empty-note">Aucun contenu renseigné.</p>'
          : `<ul class="bullets">${lastContenu.map(c => `<li>${escapeHtml(c)}</li>`).join('')}</ul>`
        }
        ${previousSeances.length > 0 ? `
          <button type="button" class="toggle-link" id="togglePrevBtn" onclick="togglePreviousSessions()">voir ${previousSeances.length} séances précédentes ↓</button>
          <div class="previous-sessions" id="previousSessions">
            ${[...previousSeances].reverse().map((sess, i) => `
              <div class="prev-session-item">
                <div class="dot">${previousSeances.length - i}</div>
                <div class="body">
                  <div class="date">${escapeHtml(sess.date || '')}</div>
                  ${sess.focus ? `<div class="focus">${escapeHtml(sess.focus)}</div>` : ''}
                  ${(sess.contenu && sess.contenu.length) ? `<ul class="bullets muted">${sess.contenu.map(c => `<li>${escapeHtml(c)}</li>`).join('')}</ul>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        ` : ''}
      </div>

      <!-- ══ CARD 2 : À PRÉPARER ═══════════════════════════════ -->
      <div class="card">
        <div class="card-title">🎯 À préparer</div>
        <div class="card-section">
          <div class="card-section-label">Théorie en cours</div>
          ${theorieInProgress.length === 0
            ? '<p class="empty-note">Aucune notion en cours.</p>'
            : `<ul class="bullets">${theorieInProgress.map(t => `<li>${escapeHtml(t.label)}</li>`).join('')}</ul>`
          }
        </div>
        <div class="card-section">
          <div class="card-section-label">Devoirs récurrents</div>
          <ul class="bullets">${devoirsRecurrents.map(d => `<li>${escapeHtml(d)}</li>`).join('')}</ul>
        </div>
        <div class="card-section">
          <div class="card-section-label">Répertoire actif</div>
          ${repertoireActif.length === 0
            ? '<p class="empty-note">Aucun morceau en cours.</p>'
            : `<ul class="bullets">${repertoireActif.map(r => `<li>${escapeHtml(r.titre)}${r.compositeur ? ` <span style="color:var(--text3);font-size:12px;">— ${escapeHtml(r.compositeur)}</span>` : ''}</li>`).join('')}</ul>`
          }
        </div>
      </div>

      <!-- ══ CARD 3 : THÉORIE COUVERTE ═════════════════════════ -->
      <div class="card">
        <div class="card-title">📊 Théorie couverte</div>
        ${theorie.length === 0
          ? '<p class="empty-note">Aucune notion tracée.</p>'
          : `<div class="theory-grid">${theorie.map((t, ti) => `
            <div class="theory-item ${escapeHtml(t.statut || 'todo')}"
                 onclick="toggleTheory(this, '${s.id}', ${ti})"
                 title="Cliquer pour changer le statut">
              <div class="theory-check">${t.statut === 'done' ? '✓' : t.statut === 'in-progress' ? '◐' : '○'}</div>
              <span class="theory-label">${escapeHtml(t.label)}</span>
            </div>`).join('')}</div>`
        }
      </div>

      <!-- ══ CARD 4 : CANAUX & DOC ═════════════════════════════ -->
      <div class="card">
        <div class="card-title">📡 Canaux &amp; 🔗 Doc</div>
        <div class="link-list">
          ${s.canaux?.telegram?.url ? `
            <a href="${escapeHtml(s.canaux.telegram.url)}" target="_blank" rel="noopener" class="link-item">
              <div class="link-icon tg">✈️</div>
              <div class="link-info">
                <div class="link-name">Telegram</div>
                <div class="link-sub">${escapeHtml(s.canaux.telegram.handle || '')}</div>
              </div>
              <span class="link-arrow">↗</span>
            </a>` : ''}
          ${s.canaux?.discord?.url ? `
            <a href="${escapeHtml(s.canaux.discord.url)}" target="_blank" rel="noopener" class="link-item">
              <div class="link-icon dc">💬</div>
              <div class="link-info">
                <div class="link-name">Discord</div>
                <div class="link-sub">${escapeHtml(s.canaux.discord.handle || '')}</div>
              </div>
              <span class="link-arrow">↗</span>
            </a>` : ''}
          ${s.canaux?.bonzai?.url ? `
            <a href="${escapeHtml(s.canaux.bonzai.url)}" target="_blank" rel="noopener" class="link-item">
              <div class="link-icon bz">🌿</div>
              <div class="link-info">
                <div class="link-name">Bonzai</div>
                <div class="link-sub">${escapeHtml(s.canaux.bonzai.handle || '')}</div>
              </div>
              <span class="link-arrow">↗</span>
            </a>` : ''}
          ${s.doc_url ? `
            <a href="${escapeHtml(s.doc_url)}" target="_blank" rel="noopener" class="link-item">
              <div class="link-icon dr">📄</div>
              <div class="link-info">
                <div class="link-name">Google Doc élève</div>
                <div class="link-sub">Séances · Notes</div>
              </div>
              <span class="link-arrow">↗</span>
            </a>` : ''}
        </div>
        <div class="dates-block">
          <div class="date-block">
            <div class="date-label">Premier cours</div>
            <div class="date-value"><span id="student-first-course">${escapeHtml(s.premier_cours || '—')}</span></div>
          </div>
          <div class="date-block">
            <div class="date-label">Fin prévue</div>
            <div class="date-value"><span id="student-end-date">${escapeHtml(s.fin_prevue || '—')}</span></div>
          </div>
        </div>
      </div>
    </div>
  `;

  setTimeout(() => {
    const firstCourseEl = document.getElementById('student-first-course');
    const endDateEl = document.getElementById('student-end-date');
    if (firstCourseEl) {
      firstCourseEl.classList.add('date-editable');
      firstCourseEl.addEventListener('click', () => makeEditable(firstCourseEl, s.id, 'premier_cours'));
      if (s.manualDates) markManual(firstCourseEl);
    }
    if (endDateEl) {
      endDateEl.classList.add('date-editable');
      endDateEl.addEventListener('click', () => makeEditable(endDateEl, s.id, 'fin_prevue'));
      if (s.manualDates) markManual(endDateEl);
    }
  }, 50);
}

function togglePreviousSessions() {
  const el = document.getElementById('previousSessions');
  const btn = document.getElementById('togglePrevBtn');
  if (!el || !btn) return;
  const open = el.classList.toggle('open');
  const n = el.querySelectorAll('.prev-session-item').length;
  btn.innerHTML = open ? 'masquer les séances précédentes ↑' : `voir ${n} séances précédentes ↓`;
}
window.togglePreviousSessions = togglePreviousSessions;

async function selectStudent(id, forceSync = false) {
  activeId = id;
  renderTabs();
  const meta = STUDENT_LIST.find(s => s.id === id);
  if (!meta) return;
  const url = new URL(window.location);
  url.searchParams.set('eleve', id);
  history.replaceState(null, '', url);

  if (!forceSync && clientCache[id]) { renderProfile(clientCache[id]); return; }
  showLoader(meta.nom);
  try {
    const res = await fetch(`/api/eleves/${id}${forceSync ? '?sync=true' : ''}`, {
      headers: authHeaders()
    });
    const data = await res.json();
    if (!res.ok || data.error) { showError(data.error || `Erreur ${res.status}`, data.details); return; }
    clientCache[id] = data;
    renderProfile(data);
  } catch (e) {
    showError('Erreur réseau. Vérifie ta connexion et réessaie.', e.message);
  }
}
window.selectStudent = selectStudent;

function syncStudent() {
  if (activeId) { delete clientCache[activeId]; selectStudent(activeId, true); }
}
window.syncStudent = syncStudent;

async function syncFromGDocs() {
  const btn = document.getElementById('syncAllBtn');
  if (!btn) return;
  const original = btn.innerHTML;
  btn.innerHTML = '<span class="icon">⏳</span><span class="label">Sync…</span>';
  btn.disabled = true;
  try {
    const res = await fetch('/api/eleves/sync', {
      method: 'POST',
      headers: authHeaders()
    });
    const data = await res.json();
    if (data.success) {
      const summary = Object.entries(data.results)
        .map(([name, r]) => r.ok
          ? `✓ ${capitalize(name)} (${r.sessions} séances)`
          : `✗ ${capitalize(name)}: ${r.error}`)
        .join('\n');
      alert('Sync terminé :\n' + summary);
      clientCache = {};
      if (activeId) selectStudent(activeId);
    } else {
      alert('Erreur sync');
    }
  } catch (e) {
    alert('Erreur sync: ' + e.message);
  } finally {
    btn.innerHTML = original;
    btn.disabled = false;
  }
}
window.syncFromGDocs = syncFromGDocs;

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function showToast(msg) {
  let t = document.querySelector('.pk-toast');
  if (!t) { t = document.createElement('div'); t.className = 'pk-toast'; document.body.appendChild(t); }
  t.textContent = msg;
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(showToast._tid);
  showToast._tid = setTimeout(() => t.classList.remove('show'), 2000);
}

function markManual(el) {
  el.setAttribute('data-manual', 'true');
  el.style.borderBottom = '1px dashed var(--green, #3dd68c)';
  el.title = 'Modifié manuellement — protégé du sync';
}

function computeTimeProgression(firstCourse, endDate) {
  function parseDate(str) {
    if (!str) return null;
    const parts = str.split('/');
    if (parts.length !== 3) return null;
    return new Date(
      parseInt(parts[2]),
      parseInt(parts[1]) - 1,
      parseInt(parts[0])
    );
  }
  const start = parseDate(firstCourse);
  const end   = parseDate(endDate);
  const today = new Date();
  if (!start || !end || isNaN(start) || isNaN(end)) return 0;
  const totalDays = (end - start) / (1000 * 60 * 60 * 24);
  if (totalDays <= 0) return 0;
  const elapsedDays = (today - start) / (1000 * 60 * 60 * 24);
  return Math.min(100, Math.max(0, Math.round((elapsedDays / totalDays) * 100)));
}

function makeEditable(el, studentId, field) {
  const current = el.textContent.trim();
  function toISO(str) {
    if (!/^\d{2}\/\d{2}\/\d{4}$/.test(str)) return '';
    const [d, m, y] = str.split('/');
    return `${y}-${m}-${d}`;
  }
  function toDisplay(str) {
    const [y, m, d] = str.split('-');
    return `${d}/${m}/${y}`;
  }

  const input = document.createElement('input');
  input.type = 'date';
  input.value = toISO(current);
  input.style.cssText = `
    background: rgba(139,111,232,0.1);
    border: 1px solid #8B6FE8;
    border-radius: 6px;
    color: #eeeaf8;
    font-family: inherit;
    font-size: inherit;
    font-weight: inherit;
    padding: 2px 8px;
    outline: none;
    width: 140px;
  `;

  el.replaceWith(input);
  input.focus();

  let done = false;
  async function save() {
    if (done) return; done = true;
    const newVal = input.value;
    if (!newVal) { input.replaceWith(el); return; }
    const display = toDisplay(newVal);
    el.textContent = display;
    input.replaceWith(el);
    if (clientCache[studentId]) {
      clientCache[studentId][field] = display;
      clientCache[studentId].manualDates = true;
    }

    const newProgression = computeTimeProgression(
      clientCache[studentId]?.premier_cours,
      clientCache[studentId]?.fin_prevue
    );
    if (clientCache[studentId]) clientCache[studentId].progression = newProgression;

    // Rafraîchir le bandeau contexte pour refléter la nouvelle date / progression
    if (clientCache[studentId]) renderCtx(clientCache[studentId]);

    try {
      const res = await fetch(`/api/eleves/${studentId}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          ...authHeaders()
        },
        body: JSON.stringify({
          [field]: display,
          manualDates: true,
          progression: newProgression
        })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      showToast('Date mise à jour ✓');
      markManual(el);
    } catch (e) {
      showToast('Erreur sauvegarde');
    }
  }

  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { done = true; input.replaceWith(el); }
  });
}

function toggleTheory(el, studentId, index) {
  const order = ['todo', 'in-progress', 'done'];
  const current = el.classList.contains('done') ? 'done'
    : el.classList.contains('in-progress') ? 'in-progress' : 'todo';
  const next = order[(order.indexOf(current) + 1) % order.length];
  el.classList.remove('done', 'in-progress', 'todo');
  el.classList.add(next);
  const check = el.querySelector('.theory-check');
  if (check) check.textContent = next === 'done' ? '✓' : next === 'in-progress' ? '◐' : '○';
  if (clientCache[studentId] && clientCache[studentId].theorie && clientCache[studentId].theorie[index]) {
    clientCache[studentId].theorie[index].statut = next;
  }
}
window.toggleTheory = toggleTheory;

function init() {
  renderTabs();
  const params = new URLSearchParams(window.location.search);
  const eleveParam = (params.get('eleve') || '').toLowerCase();
  const valid = STUDENT_LIST.find(s => s.id === eleveParam);
  const targetId = valid ? valid.id : 'japhet';
  renderEmpty();
  setTimeout(() => selectStudent(targetId), 200);
}
</script>

<script>
// ─── Login overlay ─────────────────────────────────────────────
(function(){
  const overlay = document.getElementById('login-overlay');
  const form = document.getElementById('login-form');
  const input = document.getElementById('login-input');
  const err = document.getElementById('login-error');

  let launched = false;
  function reveal(){
    overlay.classList.add('hidden');
    if (!launched) { launched = true; init(); }
  }
  function lock(){
    overlay.classList.remove('hidden');
    setTimeout(() => input.focus(), 50);
  }

  if (localStorage.getItem('mh_admin') === '4697') {
    reveal();
  } else {
    lock();
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    if (input.value === '4697') {
      localStorage.setItem('mh_admin', '4697');
      err.textContent = '';
      input.value = '';
      reveal();
    } else {
      err.textContent = 'Code incorrect';
      input.value = '';
      input.focus();
    }
  });

  document.getElementById('logout-btn').addEventListener('click', function(){
    localStorage.removeItem('mh_admin');
    window.location.reload();
  });
})();
</script>
