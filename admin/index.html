<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Élèves — Master Hub Admin</title>
  <meta name="theme-color" content="#09090f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MH Admin">
  <link rel="icon" id="app-icon">
  <link rel="apple-touch-icon" id="app-touch-icon" sizes="180x180">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --v:       #8B6FE8;
      --v-dim:   #8B6FE826;
      --v-soft:  #6b54c4;
      --bg0:     #09090f;
      --bg1:     #0f0e18;
      --bg2:     #161524;
      --bg3:     #1e1c30;
      --text1:   #eeeaf8;
      --text2:   #9d9ab5;
      --text3:   #5a5870;
      --border:  #25233a;
      --green:   #5ecb8b;
      --amber:   #f0b429;
      --red:     #e05c6b;
      --sidebar: 268px;
      --r:       10px;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg0);
      color: var(--text1);
      display: flex;
      overflow: hidden;
    }

    /* ── Login overlay ──────────────────────────────────────── */
    #login-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(9, 9, 15, 0.94);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    #login-overlay.hidden { display: none; }

    .login-card {
      width: 100%;
      max-width: 360px;
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .login-card .logo {
      width: 56px;
      height: 56px;
    }

    .login-card h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text1);
      letter-spacing: -0.01em;
    }

    .login-card form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }

    .login-card input {
      width: 100%;
      background: var(--bg2);
      color: var(--text1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 1rem;
      font-family: inherit;
      min-height: 46px;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: var(--v); }

    .login-card button {
      width: 100%;
      background: var(--v);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      min-height: 46px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .login-card button:hover { background: var(--v-soft); }

    .login-error {
      font-size: 0.85rem;
      color: var(--red);
      text-align: center;
      min-height: 1.2em;
    }

    /* ── Top-right mini nav ─────────────────────────────────── */
    .top-nav {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 50;
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .top-nav a,
    .top-nav button {
      background: var(--bg1);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 11.5px;
      padding: 7px 11px;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }
    .top-nav a:hover,
    .top-nav button:hover {
      border-color: var(--v);
      color: var(--text1);
    }

    /* ── Sidebar ────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar);
      min-width: var(--sidebar);
      height: 100vh;
      background: var(--bg1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-logo {
      padding: 22px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-logo .logo-icon {
      width: 34px; height: 34px;
      background: var(--v);
      border-radius: 8px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .sidebar-logo .logo-icon svg { width: 22px; height: 22px; display: block; }
    .sidebar-logo .logo-text { font-size: 14px; font-weight: 600; color: var(--text1); }
    .sidebar-logo .logo-sub {
      font-size: 10px; color: var(--text3);
      font-family: 'DM Mono', monospace;
      text-transform: uppercase; letter-spacing: .06em;
    }

    .sidebar-section-label {
      padding: 18px 20px 8px;
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--text3);
    }

    .student-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 10px 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .student-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: var(--r);
      cursor: pointer;
      transition: background .15s, border-color .15s;
      border: 1px solid transparent;
      margin-bottom: 3px;
    }
    .student-card:hover { background: var(--bg2); }
    .student-card.active { background: var(--v-dim); border-color: var(--v); }

    .student-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg3);
      display: grid; place-items: center;
      font-size: 13px; font-weight: 700;
      color: var(--v);
      flex-shrink: 0;
      border: 1.5px solid var(--border);
      transition: border-color .15s;
    }
    .student-card.active .student-avatar { border-color: var(--v); background: var(--v-dim); }

    .student-info-mini .sname { font-size: 13.5px; font-weight: 600; color: var(--text1); }
    .student-info-mini .sprog { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

    /* ── Main ──────────────────────────────────────────────── */
    .main {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .profile-header {
      padding: 32px 36px 28px;
      border-bottom: 1px solid var(--border);
      background: var(--bg0);
      position: sticky; top: 0; z-index: 10;
    }

    .header-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 20px;
      margin-bottom: 22px;
    }

    .student-id { display: flex; align-items: center; gap: 16px; }

    .avatar-large {
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, var(--v-soft), var(--v));
      display: grid; place-items: center;
      font-size: 22px; font-weight: 700;
      color: #fff; flex-shrink: 0;
    }

    .student-name-block .name {
      font-size: 22px; font-weight: 700;
      letter-spacing: -.02em; margin-bottom: 5px;
    }

    .badges { display: flex; gap: 7px; flex-wrap: wrap; }

    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .badge-prog  { background: var(--v-dim); color: var(--v); }
    .badge-active { background: #5ecb8b1a; color: var(--green); }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    .header-actions { display: flex; gap: 8px; }

    .action-btn {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 14px; border-radius: 8px;
      font-size: 12.5px; font-weight: 600;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer; transition: all .15s;
      text-decoration: none; border: none;
    }
    .action-btn-ghost {
      background: transparent; border: 1px solid var(--border);
      color: var(--text2);
    }
    .action-btn-ghost:hover { border-color: var(--text2); color: var(--text1); }
    .action-btn-primary { background: var(--v); border: 1px solid var(--v); color: #fff; }
    .action-btn-primary:hover { background: var(--v-soft); }

    .stats-bar {
      display: flex;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }

    .stat-item {
      flex: 1; padding: 12px 16px;
      border-right: 1px solid var(--border);
    }
    .stat-item:last-child { border-right: none; }

    .stat-label {
      font-size: 10px; color: var(--text3);
      text-transform: uppercase; letter-spacing: .08em;
      font-family: 'DM Mono', monospace; margin-bottom: 4px;
    }
    .stat-value { font-size: 13.5px; font-weight: 600; color: var(--text1); }
    .date-editable {
      cursor: pointer;
      border-bottom: 1px dashed rgba(139,111,232,0.4);
      transition: border-color 0.15s, color 0.15s;
      display: inline-block;
    }
    .date-editable:hover {
      border-bottom-color: #8B6FE8;
      color: #8B6FE8;
    }
    .pk-toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1a1a24; color: #eeeaf8; border: 1px solid rgba(139,111,232,0.4);
      padding: 10px 18px; border-radius: 10px; font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 9999;
      opacity: 0; transition: opacity 0.2s;
    }
    .pk-toast.show { opacity: 1; }

    .prog-bar-wrap { display: flex; align-items: center; gap: 10px; }
    .prog-bar { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--v-soft), var(--v));
      border-radius: 3px; width: 0%;
      transition: width .6s ease;
    }
    .prog-pct {
      font-size: 12px; font-weight: 600; color: var(--v);
      font-family: 'DM Mono', monospace; min-width: 34px;
    }

    .profile-body {
      display: grid;
      grid-template-columns: 1fr 340px;
      flex: 1;
    }

    .col-left {
      padding: 28px 28px 28px 36px;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 24px;
    }
    .col-right {
      padding: 28px;
      display: flex; flex-direction: column; gap: 20px;
    }

    .section-title {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .1em;
      color: var(--text3); font-family: 'DM Mono', monospace;
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .timeline { display: flex; flex-direction: column; }

    .session-item { display: flex; gap: 16px; position: relative; }
    .session-item:not(:last-child)::before {
      content: '';
      position: absolute;
      left: 15px; top: 30px;
      width: 2px; bottom: -10px;
      background: var(--border);
    }

    .session-dot-wrap {
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0; padding-top: 4px;
    }
    .session-dot {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--bg3); border: 2px solid var(--border);
      display: grid; place-items: center;
      font-size: 10px; font-family: 'DM Mono', monospace;
      color: var(--text3); flex-shrink: 0;
      position: relative; z-index: 1;
    }
    .session-item.latest .session-dot {
      border-color: var(--v); background: var(--v-dim); color: var(--v);
    }

    .session-content { flex: 1; padding-bottom: 24px; }
    .session-item:last-child .session-content { padding-bottom: 0; }

    .session-header {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }
    .session-date { font-size: 11.5px; font-family: 'DM Mono', monospace; color: var(--text3); }
    .session-item.latest .session-date { color: var(--v); }
    .session-focus { font-size: 14px; font-weight: 600; color: var(--text1); margin-bottom: 10px; }

    .session-tag-latest {
      font-size: 10px; font-family: 'DM Mono', monospace;
      background: var(--v-dim); color: var(--v);
      padding: 2px 7px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .04em;
    }

    .session-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .session-block-label {
      font-size: 10px; color: var(--text3);
      text-transform: uppercase; letter-spacing: .07em;
      font-family: 'DM Mono', monospace; margin-bottom: 6px;
    }

    .session-block ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .session-block li {
      font-size: 12.5px; color: var(--text2);
      padding-left: 14px; position: relative; line-height: 1.4;
    }
    .session-block li::before { content: '–'; position: absolute; left: 0; color: var(--text3); }

    .session-divider { height: 1px; background: var(--border); margin: 14px 0; }

    .repertoire-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--bg3);
      border-radius: 8px; border: 1px solid var(--border);
    }
    .repertoire-icon { font-size: 18px; flex-shrink: 0; }
    .repertoire-info .piece-title { font-size: 13.5px; font-weight: 600; }
    .repertoire-info .piece-note { font-size: 11.5px; color: var(--text2); margin-top: 2px; }
    .piece-status {
      margin-left: auto; flex-shrink: 0;
      font-size: 10.5px; font-family: 'DM Mono', monospace;
      padding: 3px 8px; border-radius: 20px;
    }
    .status-en-cours { background: #f0b4291a; color: var(--amber); }
    .status-acquis   { background: #5ecb8b1a; color: var(--green); }

    .theory-grid { display: flex; flex-direction: column; gap: 6px; }
    .theory-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; border-radius: 7px;
      background: var(--bg3); border: 1px solid var(--border);
      transition: border-color .15s;
    }
    .theory-item:hover { border-color: var(--text3); }
    .theory-check {
      width: 18px; height: 18px; border-radius: 5px;
      display: grid; place-items: center;
      font-size: 10px; flex-shrink: 0;
    }
    .theory-item.done        .theory-check { background: #5ecb8b1a; color: var(--green); }
    .theory-item.todo        .theory-check { background: var(--bg2); color: var(--text3); border: 1px solid var(--border); }
    .theory-item.in-progress .theory-check { background: var(--v-dim); color: var(--v); }
    .theory-label { font-size: 12.5px; color: var(--text2); }
    .theory-item.done .theory-label { color: var(--text1); }

    .canal-list { display: flex; flex-direction: column; gap: 8px; }
    .canal-item {
      display: flex; align-items: center; gap: 11px;
      padding: 10px 12px; border-radius: 8px;
      background: var(--bg3); border: 1px solid var(--border);
      text-decoration: none;
      transition: border-color .15s, background .15s;
    }
    .canal-item:hover { border-color: var(--v); background: var(--v-dim); }
    .canal-icon {
      width: 28px; height: 28px; border-radius: 7px;
      display: grid; place-items: center;
      font-size: 13px; flex-shrink: 0;
    }
    .canal-icon.tg { background: #229ED91a; }
    .canal-icon.dc { background: #5865F21a; }
    .canal-icon.bz { background: var(--v-dim); }
    .canal-name   { font-size: 13px; font-weight: 600; color: var(--text1); }
    .canal-handle { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
    .canal-arrow  { margin-left: auto; color: var(--text3); font-size: 12px; }

    .doc-link {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 8px;
      border: 1px dashed var(--border);
      text-decoration: none; transition: border-color .15s;
    }
    .doc-link:hover { border-color: var(--v); }
    .doc-link-icon  { font-size: 16px; }
    .doc-link-label { font-size: 12.5px; color: var(--text2); font-weight: 500; }
    .doc-link-sub   { font-size: 10.5px; color: var(--text3); margin-top: 1px; }
    .doc-link-ext   { margin-left: auto; color: var(--text3); font-size: 12px; }

    .no-selection {
      flex: 1; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 14px;
      color: var(--text3);
    }
    .no-selection .ns-icon { font-size: 42px; opacity: .3; }
    .no-selection p { font-size: 14px; }

    @keyframes spin { to { transform: rotate(360deg); } }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 900px) {
      .profile-body { grid-template-columns: 1fr; }
      .col-left { border-right: none; border-bottom: 1px solid var(--border); padding: 20px; }
      .col-right { padding: 20px; }
      .session-cols { grid-template-columns: 1fr; }
    }

    .hamburger {
      display: none;
      position: fixed;
      top: 14px; left: 14px;
      z-index: 100;
      background: var(--bg1);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 38px; height: 38px;
      align-items: center; justify-content: center;
      cursor: pointer;
      flex-direction: column; gap: 5px;
      padding: 0;
    }
    .hamburger span {
      display: block;
      width: 18px; height: 2px;
      background: var(--text2);
      border-radius: 2px;
      transition: all .2s;
    }
    .sidebar-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 40;
    }
    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .sidebar {
        position: fixed;
        top: 0; left: 0;
        height: 100vh;
        z-index: 50;
        transform: translateX(-100%);
        transition: transform .25s ease;
      }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
      .main { padding-top: 56px; }

      .top-nav {
        top: 14px; right: 14px;
      }
      .top-nav a,
      .top-nav button { font-size: 11px; padding: 6px 9px; }

      .header-top {
        flex-wrap: wrap;
        gap: 8px;
      }
      .header-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
        width: 100%;
        margin-top: 8px;
      }
      .header-actions button,
      .header-actions a {
        font-size: 0.75rem;
        padding: 8px 10px;
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .btn-gdoc,
      .btn-sync-all { display: none; }

      .stats-bar {
        display: grid !important;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .stat-item { border-right: none !important; }
      .stat-item[style*="flex:2"] { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>

<!-- ═══ LOGIN OVERLAY ═══════════════════════════════════════════ -->
<div id="login-overlay">
  <div class="login-card">
    <svg class="logo" width="56" height="56" viewBox="0 0 72 72">
      <circle cx="36" cy="36" r="34" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
      <rect x="16" y="19" width="11.5" height="34" rx="2" fill="#fff"/>
      <rect x="30" y="19" width="11.5" height="34" rx="2" fill="#fff"/>
      <rect x="44" y="19" width="11.5" height="34" rx="2" fill="#fff"/>
      <rect x="24" y="19" width="8" height="21" rx="1.5" fill="#080808"/>
      <rect x="38" y="19" width="8" height="21" rx="1.5" fill="#080808"/>
    </svg>
    <h2>Master Hub Admin</h2>
    <form id="login-form" autocomplete="off">
      <input id="login-input" type="password" placeholder="Code d'accès" autocomplete="off" inputmode="numeric">
      <div class="login-error" id="login-error"></div>
      <button type="submit">Entrer</button>
    </form>
  </div>
</div>

<!-- ═══ TOP-RIGHT MINI NAV ═════════════════════════════════════ -->
<nav class="top-nav">
  <a href="/admin/outils.html">Outils &rarr;</a>
  <button type="button" id="logout-btn">Se d&eacute;connecter</button>
</nav>

<!-- ═══ HAMBURGER + SIDEBAR ═════════════════════════════════════ -->
<button class="hamburger" onclick="toggleSidebar()" aria-label="Menu">
  <span></span><span></span><span></span>
</button>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">
      <svg viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
        <rect x="16" y="19" width="11.5" height="34" rx="2" fill="#fff"/>
        <rect x="30" y="19" width="11.5" height="34" rx="2" fill="#fff"/>

<script>
// ── Login overlay ───────────────────────────────────────────────
(function(){
  const overlay = document.getElementById('login-overlay');
  const form = document.getElementById('login-form');
  const input = document.getElementById('login-input');
  const err = document.getElementById('login-error');

  function reveal(){ overlay.classList.add('hidden'); }
  function lock(){
    overlay.classList.remove('hidden');
    setTimeout(() => input.focus(), 50);
  }

  if (localStorage.getItem('mh_admin') === '4697') {
    reveal();
  } else {
    lock();
  }

  form.addEventListener('submit', function(e){
    e.preventDefault();
    if (input.value === '4697') {
      localStorage.setItem('mh_admin', '4697');
      err.textContent = '';
      input.value = '';
      reveal();
    } else {
      err.textContent = 'Code incorrect';
      input.value = '';
      input.focus();
    }
  });

  document.getElementById('logout-btn').addEventListener('click', function(){
    localStorage.removeItem('mh_admin');
    window.location.reload();
  });
})();
</script>

(function(){

    + '<rect width="72" height="72" rx="16" fill="#8B6FE8"/>'
    + '<circle cx="36" cy="36" r="34" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1.5"/>'
    + '<rect x="16" y="19" width="11.5" height="34" rx="2" fill="#fff"/>'
    + '<rect x="30" y="19" width="11.5" height="34" rx="2" fill="#fff"/>'
    + '<rect x="44" y="19" width="11.5" height="34" rx="2" fill="#fff"/>'
    + '<rect x="24" y="19" width="8" height="21" rx="1.5" fill="#080808"/>'
    + '<rect x="38" y="19" width="8" height="21" rx="1.5" fill="#080808"/>'
    + '</svg>';
  const iconUrl = 'data:image/svg+xml;base64,' + btoa(iconSvg);

  document.getElementById('app-icon').href = iconUrl;
  document.getElementById('app-touch-icon').href = iconUrl;

  const manifest = {
    name: 'Master Hub Admin',

    scope: '/admin/',

<script>
// ── Élèves — liste + profil ─────────────────────────────────────
const STUDENT_LIST = [
  { id: 'japhet', nom: 'Japhet', programme: 'Piano Master', statut: 'actif' },
  { id: 'messon', nom: 'Messon', programme: 'Piano Master', statut: 'actif' },
  { id: 'dexter', nom: 'Dexter', programme: 'Piano Master', statut: 'actif' },
  { id: 'tara',   nom: 'Tara',   programme: 'Piano Master', statut: 'actif' }
];

let activeId    = null;
let clientCache = {};

function authHeaders() {
  return { 'x-admin-secret': localStorage.getItem('mh_admin') || '' };
}

function renderSidebar() {
  document.getElementById('studentList').innerHTML = STUDENT_LIST.map(s => `
    <div class="student-card ${activeId === s.id ? 'active' : ''}" onclick="selectStudent('${s.id}')">
      <div class="student-avatar">${s.nom[0]}</div>
      <div class="student-info-mini">
        <div class="sname">${s.nom}</div>
        <div class="sprog">${s.programme}</div>
      </div>
    </div>
  `).join('');
}

function showLoader(nom) {
  document.getElementById('mainContent').innerHTML = `
    <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;color:var(--text3);min-height:100vh;">
      <div style="width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--v);border-radius:50%;animation:spin .8s linear infinite;"></div>
      <p style="font-size:13px;">Chargement du profil de ${nom}…</p>
      <p style="font-size:11px;color:var(--text3);opacity:.6;">Lecture du Google Doc + parsing Gemini</p>
    </div>
  `;
}

function showError(message, details) {
  document.getElementById('mainContent').innerHTML = `
    <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text3);padding:40px;min-height:100vh;">
      <div style="font-size:32px;">⚠️</div>
      <p style="font-size:14px;text-align:center;line-height:1.5;max-width:420px;color:var(--text2);">${message}</p>
      ${details ? `<p style="font-size:11px;font-family:monospace;color:var(--text3);max-width:420px;word-break:break-all;">${details}</p>` : ''}
      <button onclick="selectStudent('${activeId}', true)" style="margin-top:8px;padding:8px 16px;background:var(--v);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600;">
        Réessayer
      </button>
    </div>
  `;
}

async function selectStudent(id, forceSync = false) {
  activeId = id;
  renderSidebar();
  const meta = STUDENT_LIST.find(s => s.id === id);
  if (!forceSync && clientCache[id]) { renderProfile(clientCache[id]); return; }
  showLoader(meta?.nom || id);
  try {
    const res  = await fetch(`/api/eleves/${id}${forceSync ? '?sync=true' : ''}`, {
      headers: authHeaders()
    });
    const data = await res.json();
    if (!res.ok || data.error) { showError(data.error || `Erreur ${res.status}`, data.details); return; }
    clientCache[id] = data;
    renderProfile(data);
  } catch (e) {
    showError('Erreur réseau. Vérifie ta connexion et réessaie.', e.message);
  }
}

function syncStudent() {
  if (activeId) { delete clientCache[activeId]; selectStudent(activeId, true); }
}

async function syncFromGDocs() {
  const btn = document.querySelector('[onclick="syncFromGDocs()"]');
  if (!btn) return;
  const original = btn.innerHTML;
  btn.innerHTML = '⏳ Sync...';
  btn.disabled = true;
  try {
    const res = await fetch('/api/eleves/sync', {
      method: 'POST',
      headers: authHeaders()
    });
    const data = await res.json();
    if (data.success) {
      const summary = Object.entries(data.results)
        .map(([name, r]) => r.ok
          ? `✓ ${capitalize(name)} (${r.sessions} séances)`
          : `✗ ${capitalize(name)}: ${r.error}`)
        .join('\n');
      alert('Sync terminé :\n' + summary);
      clientCache = {};
      if (activeId) selectStudent(activeId);
    } else {
      alert('Erreur sync');
    }
  } catch (e) {
    alert('Erreur sync: ' + e.message);
  } finally {
    btn.innerHTML = original;
    btn.disabled = false;
  }
}
function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
window.syncFromGDocs = syncFromGDocs;

function renderProfile(s) {
  const seances = s.seances || [];
  const theorie = s.theorie || [];
  const progression = typeof s.progression === 'number' ? s.progression
    : (theorie.length ? Math.round(theorie.filter(t => t.statut === 'done').length / theorie.length * 100) : 0);
  const sessionCount = s.sessionCount || seances.length;
  const lastSession = s.lastSession || seances[seances.length - 1]?.date || null;
  const premierCours = s.premier_cours || s.debut || (seances.length ? seances[0].date : '—');
  const finPrevue = s.fin_prevue || '—';

  document.getElementById('mainContent').innerHTML = `
    <div class="profile-header">
      <div class="header-top">
        <div class="student-id">
          <div class="avatar-large">${s.nom[0]}</div>
          <div class="student-name-block">
            <div class="name">${s.nom}</div>
            <div class="badges">
              <span class="badge badge-prog">${s.programme}</span>
              <span class="badge badge-active"><span class="badge-dot"></span>${s.statut}</span>
            </div>
          </div>
        </div>
        <div class="header-actions">
          ${s.doc_url ? `<a href="${s.doc_url}" target="_blank" class="action-btn action-btn-ghost btn-gdoc">📄 Google Doc</a>` : ''}
          <button onclick="syncStudent()" class="action-btn action-btn-ghost">🔄 Sync</button>
          <button onclick="syncFromGDocs()" class="action-btn action-btn-ghost btn-sync-all">🔄 Sync All</button>
        </div>
      </div>
      <div class="stats-bar">
        <div class="stat-item"><div class="stat-label">Premier cours</div><div class="stat-value" id="student-first-course">${premierCours}</div></div>
        <div class="stat-item"><div class="stat-label">Fin prévue</div><div class="stat-value" id="student-end-date">${finPrevue}</div></div>
        <div class="stat-item"><div class="stat-label">Séances</div><div class="stat-value">${sessionCount} réalisées</div></div>
        <div class="stat-item" style="flex:2;">
          <div class="stat-label">Progression estimée</div>
          <div class="prog-bar-wrap">
            <div class="prog-bar"><div class="prog-fill" data-target="${progression}"></div></div>
            <span class="prog-pct">${progression}%</span>
          </div>
        </div>
      </div>
    </div>
    <div class="profile-body">
      <div class="col-left">
        <div>
          <div class="section-title">Historique des séances</div>
          ${seances.length === 0
            ? `<p style="font-size:13px;color:var(--text3);">Aucune séance enregistrée.</p>`
            : (() => { const reversed = [...seances].reverse(); return `<div class="timeline">${reversed.map((sess, i) => `
              <div class="session-item ${i === 0 ? 'latest' : ''}">
                <div class="session-dot-wrap"><div class="session-dot">${seances.length - i}</div></div>
                <div class="session-content">
                  <div class="session-header">
                    <span class="session-date">${sess.date}</span>
                    ${i === 0 ? '<span class="session-tag-latest">Dernière</span>' : ''}
                  </div>
                  <div class="session-focus">${sess.focus}</div>
                  <div class="session-cols">
                    <div class="session-block">
                      <div class="session-block-label">Contenu</div>
                      <ul>${(sess.contenu || []).map(c => `<li>${c}</li>`).join('')}</ul>
                    </div>
                    <div class="session-block">
                      <div class="session-block-label">Devoirs</div>
                      <ul>${(sess.devoirs || []).map(d => `<li>${d}</li>`).join('')}</ul>
                    </div>
                  </div>
                  ${i < reversed.length - 1 ? '<div class="session-divider"></div>' : ''}
                </div>
              </div>`).join('')}</div>`})()}
        </div>
        <div>
          <div class="section-title">Répertoire</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${(s.repertoire || []).map(r => `
              <div class="repertoire-item">
                <div class="repertoire-icon">🎵</div>
                <div class="repertoire-info">
                  <div class="piece-title">${r.titre}</div>
                  <div class="piece-note">${r.compositeur}${r.note ? ' · ' + r.note : ''}</div>
                </div>
                ${r.youtube ? `<a href="${r.youtube}" target="_blank" style="margin-left:auto;flex-shrink:0;font-size:11px;font-family:'DM Mono',monospace;color:var(--v);text-decoration:none;padding:3px 8px;border:1px solid var(--v);border-radius:20px;white-space:nowrap;">▶ YouTube</a>` : ''}
                <span class="piece-status status-${r.statut}" style="${r.youtube ? '' : 'margin-left:auto;'}">${r.statut === 'en-cours' ? 'En cours' : 'Acquis'}</span>
              </div>`).join('')}
          </div>
        </div>
      </div>
      <div class="col-right">
        <div>
          <div class="section-title">Théorie couverte</div>
          <div class="theory-grid">
            ${theorie.map((t, ti) => `
              <div class="theory-item ${t.statut}"
                   onclick="toggleTheory(this, '${s.id}', ${ti})"
                   style="cursor:pointer;"
                   title="Cliquer pour changer le statut">
                <div class="theory-check">${t.statut === 'done' ? '✓' : t.statut === 'in-progress' ? '◐' : '○'}</div>
                <span class="theory-label">${t.label}</span>
              </div>`).join('')}
          </div>
        </div>
        <div>
          <div class="section-title">Canaux</div>
          <div class="canal-list">
            ${s.canaux?.telegram?.url ? `<a href="${s.canaux.telegram.url}" target="_blank" class="canal-item"><div class="canal-icon tg">✈️</div><div><div class="canal-name">Telegram</div><div class="canal-handle">${s.canaux.telegram.handle}</div></div><span class="canal-arrow">↗</span></a>` : ''}
            ${s.canaux?.discord?.url  ? `<a href="${s.canaux.discord.url}"  target="_blank" class="canal-item"><div class="canal-icon dc">💬</div><div><div class="canal-name">Discord</div><div class="canal-handle">${s.canaux.discord.handle}</div></div><span class="canal-arrow">↗</span></a>` : ''}
            ${s.canaux?.bonzai?.url   ? `<a href="${s.canaux.bonzai.url}"   target="_blank" class="canal-item"><div class="canal-icon bz">🌿</div><div><div class="canal-name">Bonzai</div><div class="canal-handle">${s.canaux.bonzai.handle}</div></div><span class="canal-arrow">↗</span></a>` : ''}
          </div>
        </div>
        ${s.doc_url ? `
        <div>
          <div class="section-title">Source</div>
          <a href="${s.doc_url}" target="_blank" class="doc-link">
            <span class="doc-link-icon">📄</span>
            <div><div class="doc-link-label">Google Doc élève</div><div class="doc-link-sub">Séances · Notes · Objectifs</div></div>
            <span class="doc-link-ext">↗</span>
          </a>
        </div>` : ''}
      </div>
    </div>
  `;
  setTimeout(() => {
    const fill = document.querySelector('.prog-fill');
    if (fill) fill.style.width = fill.dataset.target + '%';
    const firstCourseEl = document.getElementById('student-first-course');
    const endDateEl = document.getElementById('student-end-date');
    if (firstCourseEl) {
      firstCourseEl.classList.add('date-editable');
      firstCourseEl.addEventListener('click', () =>
        makeEditable(firstCourseEl, s.id, 'premier_cours'));
      if (s.manualDates) markManual(firstCourseEl);
    }
    if (endDateEl) {
      endDateEl.classList.add('date-editable');
      endDateEl.addEventListener('click', () =>
        makeEditable(endDateEl, s.id, 'fin_prevue'));
      if (s.manualDates) markManual(endDateEl);
    }
  }, 50);
}

function showToast(msg) {
  let t = document.querySelector('.pk-toast');
  if (!t) { t = document.createElement('div'); t.className = 'pk-toast'; document.body.appendChild(t); }
  t.textContent = msg;
  requestAnimationFrame(() => t.classList.add('show'));
  clearTimeout(showToast._tid);
  showToast._tid = setTimeout(() => t.classList.remove('show'), 2000);
}

function markManual(el) {
  el.setAttribute('data-manual', 'true');
  el.style.borderBottom = '1px dashed var(--green, #3dd68c)';
  el.title = 'Modifié manuellement — protégé du sync';
}

function computeTimeProgression(firstCourse, endDate) {
  function parseDate(str) {
    if (!str) return null;
    const parts = str.split('/');
    if (parts.length !== 3) return null;
    return new Date(
      parseInt(parts[2]),
      parseInt(parts[1]) - 1,
      parseInt(parts[0])
    );
  }
  const start = parseDate(firstCourse);
  const end   = parseDate(endDate);
  const today = new Date();
  if (!start || !end || isNaN(start) || isNaN(end)) return 0;
  const totalDays = (end - start) / (1000 * 60 * 60 * 24);
  if (totalDays <= 0) return 0;
  const elapsedDays = (today - start) / (1000 * 60 * 60 * 24);
  return Math.min(100, Math.max(0, Math.round((elapsedDays / totalDays) * 100)));
}

function makeEditable(el, studentId, field) {
  const current = el.textContent.trim();
  function toISO(str) {
    if (!/^\d{2}\/\d{2}\/\d{4}$/.test(str)) return '';
    const [d, m, y] = str.split('/');
    return `${y}-${m}-${d}`;
  }
  function toDisplay(str) {
    const [y, m, d] = str.split('-');
    return `${d}/${m}/${y}`;
  }

  const input = document.createElement('input');
  input.type = 'date';
  input.value = toISO(current);
  input.style.cssText = `
    background: rgba(139,111,232,0.1);
    border: 1px solid #8B6FE8;
    border-radius: 6px;
    color: #eeeaf8;
    font-family: inherit;
    font-size: inherit;
    font-weight: inherit;
    padding: 2px 8px;
    outline: none;
    width: 140px;
  `;

  el.replaceWith(input);
  input.focus();

  let done = false;
  async function save() {
    if (done) return; done = true;
    const newVal = input.value;
    if (!newVal) { input.replaceWith(el); return; }
    const display = toDisplay(newVal);
    el.textContent = display;
    input.replaceWith(el);
    if (clientCache[studentId]) {
      clientCache[studentId][field] = display;
      clientCache[studentId].manualDates = true;
    }

    const newProgression = computeTimeProgression(
      clientCache[studentId]?.premier_cours,
      clientCache[studentId]?.fin_prevue
    );

    const progressBar   = document.querySelector('.prog-fill');
    const progressLabel = document.querySelector('.prog-pct');
    if (progressBar)   progressBar.style.width   = newProgression + '%';
    if (progressLabel) progressLabel.textContent = newProgression + '%';
    if (clientCache[studentId]) clientCache[studentId].progression = newProgression;

    try {
      const res = await fetch(`/api/eleves/${studentId}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          ...authHeaders()
        },
        body: JSON.stringify({
          [field]: display,
          manualDates: true,
          progression: newProgression
        })
      });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      showToast('Date mise à jour ✓');
      markManual(el);
    } catch (e) {
      showToast('Erreur sauvegarde');
    }
  }

  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') input.blur();
    if (e.key === 'Escape') { done = true; input.replaceWith(el); }
  });
}

function toggleSidebar() {
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar() {
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

function toggleTheory(el, studentId, index) {
  const order = ['todo', 'in-progress', 'done'];
  const current = el.classList.contains('done') ? 'done'
    : el.classList.contains('in-progress') ? 'in-progress' : 'todo';
  const next = order[(order.indexOf(current) + 1) % order.length];
  el.classList.remove('done', 'in-progress', 'todo');
  el.classList.add(next);
  const check = el.querySelector('.theory-check');
  if (check) check.textContent = next === 'done' ? '✓' : next === 'in-progress' ? '◐' : '○';
  if (clientCache[studentId] && clientCache[studentId].theorie[index]) {
    clientCache[studentId].theorie[index].statut = next;
  }
}
window.toggleTheory = toggleTheory;

renderSidebar();
</script>
