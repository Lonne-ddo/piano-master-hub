<html lang="fr">

    <script src="https://unpkg.com/tone@14.7.77/build/Tone.js"></script>
    <style>
        :root {
            --bg: #0f0f14;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222f;
            --text: #eee;
            --text-muted: #888;
            --text-faint: #666;
            --v: #8B6FE8;
            --v-light: #a48ff0;
            --v-soft: rgba(139, 111, 232, 0.08);
            --v-soft-stronger: rgba(139, 111, 232, 0.15);
            --v-border: rgba(139, 111, 232, 0.3);
            --radius: 16px;
            --tap-min: 44px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh; min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative; z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 12px 12px 24px;
            display: flex; flex-direction: column;
            min-height: 100vh; min-height: 100dvh;
        }

        /* ── Top bar : Retour + slider volume ───────────────── */
        .top-bar {
            display: flex; align-items: center; gap: 10px;
            padding: 4px 0 8px;
        }
        .back-link {
            color: var(--text-muted);
            font-size: 1.1rem;
            text-decoration: none;
            min-width: 40px; min-height: 40px;
            display: inline-flex; align-items: center; justify-content: center;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .back-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }

        .volume-bar {
            flex: 1; min-width: 0;
            display: flex; align-items: center; gap: 10px;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
        }
        .volume-bar .volume-icon { font-size: 0.95rem; line-height: 1; flex-shrink: 0; }
        .volume-bar input[type="range"] {
            flex: 1; min-width: 0;
            accent-color: var(--v); cursor: pointer;
        }
        .volume-bar .volume-value {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: var(--text-muted);
            min-width: 38px; text-align: right;
            font-size: 0.78rem; flex-shrink: 0;
        }

        .page-title {
            font-size: 1.25rem; font-weight: 700;
            letter-spacing: -0.02em; color: #fff;
            text-align: center;
            margin-top: 4px;
        }
        .subtitle {
            font-size: 0.82rem; color: var(--text-muted);
            text-align: center; margin-top: 2px; margin-bottom: 4px;
        }

        /* ═══ Layout principal mobile-first ═══════════════════ */
        .dict-main {
            display: flex; flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }

        /* ── Clavier ─────────────────────────────────────────── */
        .kb-section {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 10px;
        }
        .kb-section svg {
            display: block;
            width: 100%;
            height: auto;
            border-radius: 6px;
        }

        /* ── Bloc info accord ────────────────────────────────── */
        .info-section {
            text-align: center;
            padding: 4px 0;
        }
        .chord-name {
            font-size: 3rem; font-weight: 700;
            color: var(--v); line-height: 1;
            letter-spacing: -0.02em;
        }
        .chord-notes {
            font-size: 1.15rem;
            color: var(--text);
            margin-top: 8px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        }
        .chord-intervals {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.92rem;
            color: var(--v-light);
            margin-top: 4px;
        }

        /* ── Section labels (uppercase) ──────────────────────── */
        .section-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--text-faint);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* ── Renversement chips (toujours visibles) ──────────── */
        .inversion-section {
            text-align: center;
        }
        .chip-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .chip {
            padding: 10px 16px;
            border-radius: 999px;
            background: var(--bg-card);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            min-height: var(--tap-min);
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .chip:hover { background: var(--bg-card-hover); }
        .chip.selected {
            background: var(--v-soft-stronger);
            color: var(--v);
            border-color: var(--v);
        }
        .chip.disabled,
        .chip:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* ── Bouton ⚙ Choisir l'accord (mobile only) ─────────── */
        .btn-open-sheet {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            gap: 8px;
            min-height: 52px;
            transition: background 0.15s;
        }
        .btn-open-sheet:hover { background: var(--bg-card-hover); }
        .btn-open-sheet .gear { font-size: 1.05rem; }

        /* ── Actions principales [Jouer | Arpège] ────────────── */
        .action-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn-action {
            font-family: inherit;
            font-size: 0.98rem;
            font-weight: 600;
            padding: 16px;
            border-radius: 14px;
            cursor: pointer;
            border: none;
            min-height: 56px;
            transition: background 0.15s, transform 0.12s;
        }
        .btn-action:active { transform: scale(0.98); }
        .btn-primary {
            background: var(--v); color: #fff;
        }
        .btn-primary:hover { background: var(--v-light); }
        .btn-secondary {
            background: var(--bg-card); color: var(--v);
            border: 1px solid var(--v-border);
        }
        .btn-secondary:hover {
            background: var(--v-soft-stronger);
            border-color: var(--v);
        }

        /* ═══ Bottom sheet (controls-panel mobile) ═══════════════ */
        .controls-panel {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: var(--bg);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 22px 22px 0 0;
            padding: 12px 16px calc(96px + env(safe-area-inset-bottom));
            max-height: 78vh;
            overflow-y: auto;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 220ms ease-out;
            -webkit-overflow-scrolling: touch;
        }
        .controls-panel.is-open {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 40px; height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            margin: 0 auto 12px;
        }

        .sheet-backdrop {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 220ms ease-out;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
        .sheet-backdrop.is-visible {
            opacity: 1;
            pointer-events: auto;
        }

        .control-group {
            margin-bottom: 22px;
        }

        /* ── Tonique : 2 lignes (blanches + bémols décalés) ──── */
        .root-grid {
            display: flex; flex-direction: column; gap: 6px;
        }
        .root-row {
            display: grid;
            gap: 6px;
        }
        .root-row.whites {
            grid-template-columns: repeat(7, 1fr);
        }
        .root-row.flats {
            grid-template-columns: 0.5fr repeat(6, 1fr) 0.5fr;
        }
        .root-btn {
            padding: 12px 0;
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            min-height: var(--tap-min);
            transition: background 0.15s, border-color 0.15s, color 0.15s;
        }
        .root-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--v-border);
        }
        .root-btn.selected {
            background: var(--v);
            color: #fff;
            border-color: var(--v);
        }
        .root-btn.flat-btn {
            background: rgba(255, 255, 255, 0.02);
        }
        .root-spacer {
            visibility: hidden;
            pointer-events: none;
        }

        /* ── Type : 5 familles ──────────────────────────────── */
        .type-families { display: flex; flex-direction: column; gap: 14px; }
        .family-group { display: flex; flex-direction: column; gap: 6px; }
        .family-label {
            font-size: 0.62rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: var(--text-faint);
            text-transform: uppercase;
        }
        .type-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .type-btn {
            padding: 10px 6px;
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            min-height: var(--tap-min);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 1px;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            text-align: center;
        }
        .type-btn:hover {
            background: var(--bg-card-hover);
            border-color: var(--v-border);
        }
        .type-btn.selected {
            background: var(--v-soft-stronger);
            color: var(--v);
            border-color: var(--v);
        }
        .type-btn .type-id {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 0.85rem;
        }
        .type-btn .type-name {
            font-size: 0.6rem;
            color: var(--text-muted);
            line-height: 1.1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }
        .type-btn.selected .type-name { color: var(--v-light); }

        /* ── Octave ─────────────────────────────────────────── */
        .octave-control {
            display: flex; align-items: center; justify-content: center;
            gap: 18px;
        }
        .oct-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .oct-btn:hover { background: var(--bg-card-hover); }
        .oct-btn.disabled { opacity: 0.3; pointer-events: none; }
        .octave-display {
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--v);
            min-width: 44px; text-align: center;
        }

        /* ── Notation toggle FR / EN ─────────────────────────── */
        .notation-toggle {
            display: flex;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 999px;
            padding: 3px;
            width: fit-content;
            margin: 0 auto;
        }
        .notation-btn {
            padding: 8px 18px;
            border-radius: 999px;
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            min-width: 44px;
            transition: background 0.15s, color 0.15s;
        }
        .notation-btn.active {
            background: var(--v);
            color: #fff;
        }

        /* ── Bouton ✓ Valider sticky (mobile only) ───────────── */
        .btn-validate {
            position: sticky;
            bottom: 12px;
            width: 100%;
            padding: 16px;
            background: var(--v);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            min-height: 56px;
            margin-top: 12px;
            box-shadow: 0 6px 20px rgba(139, 111, 232, 0.35);
            transition: background 0.15s, transform 0.12s;
        }
        .btn-validate:hover { background: var(--v-light); }
        .btn-validate:active { transform: scale(0.98); }

        /* ═══ Desktop overrides ═══════════════════════════════ */
        @media (min-width: 768px) {
            .container { padding: 24px 16px 40px; }

            .page-title { font-size: 1.6rem; margin-top: 8px; }
            .subtitle { font-size: 0.92rem; margin-bottom: 8px; }

            .dict-main {
                display: grid;
                grid-template-columns: 1fr 340px;
                gap: 24px;
                grid-template-areas:
                    "kb       controls"
                    "info     controls"
                    "inv      controls"
                    "actions  controls";
                margin-top: 16px;
            }
            .kb-section        { grid-area: kb; padding: 14px; }
            .info-section      { grid-area: info; }
            .inversion-section { grid-area: inv; }
            .action-section    { grid-area: actions; }
            .btn-open-sheet { display: none; }

            .controls-panel {
                grid-area: controls;
                position: sticky;
                top: 24px;
                align-self: start;
                transform: none !important;
                max-height: calc(100vh - 60px);
                background: var(--bg-card);
                border: 1px solid rgba(255, 255, 255, 0.06);
                border-radius: var(--radius);
                padding: 20px 18px;
                overflow-y: auto;
            }
            .sheet-handle, .btn-validate { display: none; }
            .sheet-backdrop { display: none; }

            .chord-name { font-size: 2.6rem; }
            .type-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* ── Très petit écran (≤ 360px) ──────────────────────── */
        @media (max-width: 360px) {
            .chord-name { font-size: 2.5rem; }
            .type-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <div class="container">

        <header class="top-bar">
            <a href="#" class="back-link" id="back-link" aria-label="Retour">&larr;</a>
            <div class="volume-bar">
                <span class="volume-icon">🔊</span>
                <input type="range" id="volume-slider" min="0" max="100" step="1" value="70" aria-label="Volume" />
                <span class="volume-value" id="volume-value">70%</span>
            </div>
        </header>

        <h1 class="page-title">Dictionnaire d'accords</h1>
        <p class="subtitle" id="page-subtitle">22 types · renversements · clavier</p>

        <main class="dict-main">

            <section class="kb-section">
                <svg id="chord-keyboard" viewBox="0 0 700 110" preserveAspectRatio="none"></svg>
            </section>

            <section class="info-section">
                <div class="chord-name" id="chord-name">C</div>
                <div class="chord-notes" id="chord-notes">Do · Mi · Sol</div>
                <div class="chord-intervals" id="chord-intervals">1 · 3 · 5</div>
            </section>

            <section class="inversion-section">
                <div class="section-label">Renversement</div>
                <div class="chip-row" id="inv-grid"></div>
            </section>

            <button type="button" class="btn-open-sheet" id="btn-open-sheet">
                <span class="gear">⚙</span>
                <span>Choisir l'accord</span>
            </button>

            <section class="action-section">
                <button type="button" class="btn-action btn-primary"   id="btn-play">▶ Jouer</button>
                <button type="button" class="btn-action btn-secondary" id="btn-arpeggio">♬ Arpège</button>
            </section>

            <aside class="controls-panel" id="controls-panel" aria-label="Sélection de l'accord">
                <div class="sheet-handle" aria-hidden="true"></div>

                <div class="control-group">
                    <div class="section-label">Tonique</div>
                    <div class="root-grid" id="root-grid"></div>
                </div>

                <div class="control-group">
                    <div class="section-label">Type</div>
                    <div class="type-families" id="type-families"></div>
                </div>

                <div class="control-group">
                    <div class="section-label">Octave</div>
                    <div class="octave-control">
                        <button type="button" class="oct-btn" id="oct-down" aria-label="Octave -">−</button>
                        <span class="octave-display" id="oct-display">4</span>
                        <button type="button" class="oct-btn" id="oct-up" aria-label="Octave +">+</button>
                    </div>
                </div>

                <div class="control-group">
                    <div class="section-label">Notation</div>
                    <div class="notation-toggle" role="tablist" aria-label="Notation">
                        <button type="button" id="notation-fr" class="notation-btn active">FR</button>
                        <button type="button" id="notation-en" class="notation-btn">EN</button>
                    </div>
                </div>

                <button type="button" class="btn-validate" id="btn-validate-sheet">✓ Valider</button>
            </aside>

            <div class="sheet-backdrop" id="sheet-backdrop" aria-hidden="true"></div>

        </main>
    </div>

    <script src="/mh-music-theory.js"></script>
    <script src="/accords.js"></script>

    <script>
    (function () {
        var canvas = document.getElementById("bg-canvas");
        var ctx = canvas.getContext("2d");
        var particles = [];
        var COUNT = 18;
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener("resize", resize);
        resize();
        function createParticle() {
            var w = 6 + Math.random() * 4;
            var h = 18 + Math.random() * 10;
            return {
                x: Math.random() * canvas.width,
                y: canvas.height + h,
                w: w, h: h, r: 2,
                speed: 0.15 + Math.random() * 0.35,
                opacity: 0.04 + Math.random() * 0.04,
                drift: (Math.random() - 0.5) * 0.3
            };
        }
        for (var i = 0; i < COUNT; i++) { var p = createParticle(); p.y = Math.random() * canvas.height; particles.push(p); }
        function drawRoundRect(x, y, w, h, r, alpha) {
            ctx.globalAlpha = alpha;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fill();
        }
        var rafId = null;
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.y -= p.speed;
                p.x += p.drift;
                drawRoundRect(p.x, p.y, p.w, p.h, p.r, p.opacity);
                if (p.y + p.h < 0) particles[i] = createParticle();
            }
            rafId = requestAnimationFrame(animate);
        }
        animate();
        var stopAnim = function () {
            if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
            window.removeEventListener("resize", resize);
        };
        window.addEventListener("beforeunload", stopAnim);
        window.addEventListener("pagehide", stopAnim);
    })();
    </script>

    <script src="/nav-outils.js" data-active="accords"></script>

</body>
