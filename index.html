    <style>
        :root {
            --bg: #0f0f14;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222f;
            --text: #eee;
            --text-muted: #888;
            --accent: #c9a84c;
            --accent-soft: rgba(201, 168, 76, 0.12);
            --radius: 16px;
            --tap-min: 48px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 16px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            justify-content: flex-start;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 32px 0 8px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            display: block;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #ffffff;
        }

        .header .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .greeting {
            text-align: center;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 8px;
            font-weight: 400;
        }

        /* Cards */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 28px;
            width: 100%;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 16px;
            text-decoration: none;
            color: var(--text);
            min-height: var(--tap-min);
            transition: background 0.2s, transform 0.15s;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInUp 0.4s ease forwards;
        }

        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.15s; }
        .card:nth-child(4) { animation-delay: 0.2s; }
        .card:nth-child(5) { animation-delay: 0.25s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .card:active {
            transform: scale(0.97);
            background: var(--bg-card-hover);
        }

        @media (hover: hover) {
            .card:hover {
                background: var(--bg-card-hover);
                transform: translateY(-2px);
            }
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--accent-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.3rem;
        }

        .card-body {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .card-sub {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .card-arrow {
            color: var(--text-muted);
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* Koalendar inline widget */
        .koalendar-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            opacity: 0;
        }

        .koalendar-section.open {
            max-height: 800px;
            opacity: 1;
        }

        .koalendar-wrapper {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 16px 8px;
            margin-top: 4px;
        }

        .koalendar-wrapper iframe {
            border-radius: 8px;
        }

        .card-chevron {
            color: var(--text-muted);
            font-size: 1.1rem;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .card-chevron.open {
            transform: rotate(180deg);
        }

    </style>
</head>

    <script>
    // ──────────────────────────────────────────────
    //  CONFIG ÉLÈVES — modifier ici pour ajouter/retirer
    // ──────────────────────────────────────────────
    const ELEVES = {
        messon: { nom: "Messon", drive: "https://drive.google.com/drive/folders/1fWxnPi8uMfhpPPv182CelgjVnNuy4U9R?usp=drive_link", telegram: "", koalendar: "https://koalendar.com/e/cours-piano-master?name=Messon" },
        tara:   { nom: "Tara",   drive: "https://drive.google.com/drive/folders/1b18WMHYT2cDYM3DLbEUU7WzLqKBMhtts?usp=drive_link", telegram: "", koalendar: "https://koalendar.com/e/cours-piano-master?name=Tara" },
        japhet: { nom: "Japhet", drive: "https://drive.google.com/drive/folders/1AUB8zd4LgfOfQ5lcGeEm0z3bYNzZTfYc?usp=sharing", telegram: "https://t.me/+Kt0JwAghijoxODk0", koalendar: "https://koalendar.com/e/cours-piano-master?name=Japhet" },
        dexter: { nom: "Dexter", drive: "https://drive.google.com/drive/folders/1Mk7aXS0SsI2B74gfHZtGcm09PccUOTu1?usp=drive_link", telegram: "https://t.me/+o4DoTBKy2XllMGE0", koalendar: "https://koalendar.com/e/cours-piano-master?name=Dexter" },
    };

    // ──────────────────────────────────────────────
    //  LIENS — deep links + fallback navigateur
    // ──────────────────────────────────────────────
    // SVG icons (white, 20x20)
    var ICONS = {
        play:     '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon points="7,4 19,12 7,20" stroke="#fff" stroke-width="1.5" stroke-linejoin="round" fill="none"/></svg>',
        folder:   '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 6a2 2 0 012-2h5l2 2h9a2 2 0 012 2v10a2 2 0 01-2 2H4a2 2 0 01-2-2V6z" stroke="#fff" stroke-width="1.5" fill="none"/></svg>',
        bolt:     '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/></svg>',
        calendar: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="4" width="18" height="18" rx="3" stroke="#fff" stroke-width="1.5" fill="none"/><line x1="3" y1="10" x2="21" y2="10" stroke="#fff" stroke-width="1.5"/><line x1="8" y1="2" x2="8" y2="6" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/><line x1="16" y1="2" x2="16" y2="6" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>',
        chat:     '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 12c0 4.418-4.03 8-9 8a9.86 9.86 0 01-4.255-.96L3 21l1.395-4.672C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" stroke="#fff" stroke-width="1.5" fill="none"/></svg>',
    };

    const LINKS = [
        {
            id: "videos",
            icon: ICONS.play,
            title: "Vidéos de formation",
            sub: "Bonzai — cours enregistrés",
            url: "https://www.bonzai.pro/Lonne/shop/lvgv_2905/piano-master",
        },
        {
            id: "drive",
            icon: ICONS.folder,
            title: "Mon dossier",
            sub: "Google Drive — ressources et notes",
            url: null,
            needsEleve: true,
        },
        {
            id: "live",
            icon: ICONS.bolt,
            title: "Cours en live",
            sub: "Rejoindre sur Discord",
            deepLink: "discord://channels/KtJF8dPT",
            url: "https://discord.gg/KtJF8dPT",
        },
        {
            id: "rdv",
            icon: ICONS.calendar,
            title: "Réserver un cours",
            sub: "Koalendar",
            isToggle: true,
        },
        {
            id: "chat",
            icon: ICONS.chat,
            title: "Canal de discussion",
            sub: "Telegram",
            deepLink: "tg://resolve?domain=À_REMPLACER",
            url: "https://t.me/À_REMPLACER",
            needsTelegram: true,
        },
    ];

    // ──────────────────────────────────────────────
    //  INIT
    // ──────────────────────────────────────────────
    (function init() {
        const params = new URLSearchParams(window.location.search);
        const eleveKey = (params.get("eleve") || "").toLowerCase();
        const eleve = ELEVES[eleveKey] || null;

        // Greeting
        if (eleve) {
            document.getElementById("greeting").innerHTML =
                '<p class="greeting">Bonjour ' + escapeHtml(eleve.nom) + ' \uD83D\uDC4B</p>';
        }

        // Build cards
        const container = document.getElementById("cards");

        var koalendarUrl = (eleve && eleve.koalendar)
            ? eleve.koalendar
            : "https://koalendar.com/e/cours-piano-master";
        var koalendarInitialized = false;

        LINKS.forEach(function(link) {
            // Skip Drive card if no student or empty drive URL
            if (link.needsEleve && (!eleve || !eleve.drive)) return;

            // Skip Telegram card if no student or empty telegram URL
            if (link.needsTelegram && (!eleve || !eleve.telegram)) return;

            // Toggle card for Koalendar
            if (link.isToggle) {
                var btn = document.createElement("div");
                btn.className = "card";
                btn.setAttribute("role", "button");
                btn.setAttribute("tabindex", "0");
                btn.style.cursor = "pointer";

                btn.innerHTML =
                    '<div class="card-icon">' + link.icon + '</div>' +
                    '<div class="card-body">' +
                        '<div class="card-title">' + escapeHtml(link.title) + '</div>' +
                        '<div class="card-sub">' + escapeHtml(link.sub) + '</div>' +
                    '</div>' +
                    '<span class="card-chevron">\u25BC</span>';

                container.appendChild(btn);

                // Koalendar section right after the card
                var section = document.createElement("div");
                section.className = "koalendar-section";
                section.innerHTML =
                    '<div class="koalendar-wrapper">' +
                        '<div id="inline-widget-cours-piano-master"></div>' +
                    '</div>';
                container.appendChild(section);

                btn.addEventListener("click", function() {
                    var isOpen = section.classList.toggle("open");
                    var chevron = btn.querySelector(".card-chevron");
                    if (chevron) chevron.classList.toggle("open", isOpen);
                    if (isOpen && !koalendarInitialized) {
                        koalendarInitialized = true;
                        Koalendar("inline", {
                            "url": koalendarUrl,
                            "selector": "#inline-widget-cours-piano-master"
                        });
                    }
                });

                return;
            }

            var href = link.needsEleve && eleve ? eleve.drive : link.url;
            var deepLink = link.deepLink || null;

            // Per-student Telegram override
            if (link.id === "chat" && eleve && eleve.telegram) {
                href = eleve.telegram;
                // Derive deep link: https://t.me/+CODE → tg://join?invite=CODE
                var tgMatch = eleve.telegram.match(/t\.me\/\+(.+)/);
                deepLink = tgMatch ? "tg://join?invite=" + tgMatch[1] : null;
            }

            var a = document.createElement("a");
            a.className = "card";
            a.href = href;
            a.target = "_blank";
            a.rel = "noopener noreferrer";

            // Deep link: try native app first
            if (deepLink) {
                a.addEventListener("click", function(e) {
                    e.preventDefault();
                    window.location.href = deepLink;
                    setTimeout(function() { window.open(href, "_blank", "noopener"); }, 800);
                });
            }

            a.innerHTML =
                '<div class="card-icon">' + link.icon + '</div>' +
                '<div class="card-body">' +
                    '<div class="card-title">' + escapeHtml(link.title) + '</div>' +
                    '<div class="card-sub">' + escapeHtml(link.sub) + '</div>' +
                '</div>' +
                '<span class="card-arrow">\u203A</span>';

            container.appendChild(a);
        });

        // Register manifest
        const manifestTag = document.querySelector('script[type="application/manifest+json"]');
        if (manifestTag) {
            const blob = new Blob([manifestTag.textContent], { type: "application/json" });
            const link = document.createElement("link");
            link.rel = "manifest";
            link.href = URL.createObjectURL(blob);
            document.head.appendChild(link);
        }
    })();

    function escapeHtml(str) {
        var d = document.createElement("div");
        d.textContent = str;
        return d.innerHTML;
    }
    </script>

    <script>
    // ──────────────────────────────────────────────
    //  FOND ANIMÉ — touches de piano flottantes
    // ──────────────────────────────────────────────
    (function() {
        var canvas = document.getElementById("bg-canvas");
        var ctx = canvas.getContext("2d");
        var particles = [];
        var COUNT = 18;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        function createParticle() {
            var w = 6 + Math.random() * 4;
            var h = 18 + Math.random() * 10;
            return {
                x: Math.random() * canvas.width,
                y: canvas.height + h,
                w: w,
                h: h,
                r: 2,
                speed: 0.15 + Math.random() * 0.35,
                opacity: 0.04 + Math.random() * 0.04,
                drift: (Math.random() - 0.5) * 0.3
            };
        }

        for (var i = 0; i < COUNT; i++) {
            var p = createParticle();
            p.y = Math.random() * canvas.height;
            particles.push(p);
        }

        function drawRoundRect(x, y, w, h, r, alpha) {
            ctx.globalAlpha = alpha;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fill();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.y -= p.speed;
                p.x += p.drift;
                drawRoundRect(p.x, p.y, p.w, p.h, p.r, p.opacity);
                if (p.y + p.h < 0) {
                    particles[i] = createParticle();
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    })();
    </script>

</body>
