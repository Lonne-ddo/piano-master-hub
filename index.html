    <style>
        :root {
            --bg: #0f0f14;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222f;
            --text: #eee;
            --text-muted: #888;
            --accent: #c9a84c;
            --accent-soft: rgba(201, 168, 76, 0.12);
            --radius: 16px;
            --tap-min: 48px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 16px 40px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 32px 0 8px;
        }

        .header .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #f5f5f5, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .greeting {
            text-align: center;
            font-size: 1.1rem;
            color: var(--accent);
            margin: 20px 0 4px;
            font-weight: 500;
        }

        /* Cards */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 28px;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 16px;
            text-decoration: none;
            color: var(--text);
            min-height: var(--tap-min);
            transition: background 0.2s, transform 0.15s;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInUp 0.4s ease forwards;
        }

        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.15s; }
        .card:nth-child(4) { animation-delay: 0.2s; }
        .card:nth-child(5) { animation-delay: 0.25s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .card:active {
            transform: scale(0.97);
            background: var(--bg-card-hover);
        }

        @media (hover: hover) {
            .card:hover {
                background: var(--bg-card-hover);
                transform: translateY(-2px);
            }
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--accent-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.3rem;
        }

        .card-body {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .card-sub {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .card-arrow {
            color: var(--text-muted);
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 48px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.06);
            color: var(--text-muted);
            font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#c9a84c"/>
                        <stop offset="100%" stop-color="#e6d19a"/>
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="46" fill="#0f0f14" stroke="url(#g)" stroke-width="3"/>
                <path d="M55 15c0 0-25 10-25 40c0 12 5 20 10 25c2 2-1 5-1 5l-4 8c0 0 5 3 10 3s10-3 10-3l-4-8c0 0-3-3-1-5c5-5 10-13 10-25c0-30-25-40-25-40z" fill="url(#g)"/>
                <circle cx="45" cy="55" r="8" fill="#0f0f14"/>
            </svg>
            <h1>Piano Master</h1>
            <p class="subtitle">Espace élève</p>
        </header>

        <div id="greeting"></div>
        <div class="cards" id="cards"></div>

        <footer class="footer">Piano Master Hub</footer>
    </div>

    <script>
    // ──────────────────────────────────────────────
    //  CONFIG ÉLÈVES — modifier ici pour ajouter/retirer
    // ──────────────────────────────────────────────
    const ELEVES = {
        youri:  { nom: "Youri",  drive: "https://drive.google.com/drive/folders/ID_YOURI" },
        messon: { nom: "Messon", drive: "https://drive.google.com/drive/folders/ID_MESSON" },
        tara:   { nom: "Tara",   drive: "https://drive.google.com/drive/folders/ID_TARA" },
        japhet: { nom: "Japhet", drive: "https://drive.google.com/drive/folders/ID_JAPHET" },
        dexter: { nom: "Dexter", drive: "https://drive.google.com/drive/folders/ID_DEXTER" },
    };

    // ──────────────────────────────────────────────
    //  LIENS — deep links + fallback navigateur
    // ──────────────────────────────────────────────
    const LINKS = [
        {
            id: "videos",
            icon: "\uD83C\uDFAC",
            title: "Vidéos de formation",
            sub: "Bonzai — cours enregistrés",
            url: "https://www.bonzai.pro/Lonne/shop/lvgv_2905/piano-master",
        },
        {
            id: "drive",
            icon: "\uD83D\uDCC2",
            title: "Mon dossier Drive",
            sub: "Partitions & ressources",
            url: null, // rempli dynamiquement
            needsEleve: true,
        },
        {
            id: "live",
            icon: "\uD83C\uDFA7",
            title: "Cours en live",
            sub: "Rejoindre sur Discord",
            deepLink: "discord://channels/KtJF8dPT",
            url: "https://discord.gg/KtJF8dPT",
        },
        {
            id: "rdv",
            icon: "\uD83D\uDCC5",
            title: "Réserver un cours",
            sub: "Google Calendar",
            url: "https://calendar.google.com/calendar/appointments/schedules/À_REMPLACER",
        },
        {
            id: "chat",
            icon: "\uD83D\uDCAC",
            title: "Canal de discussion",
            sub: "Telegram",
            deepLink: "tg://resolve?domain=À_REMPLACER",
            url: "https://t.me/À_REMPLACER",
        },
    ];

    // ──────────────────────────────────────────────
    //  INIT
    // ──────────────────────────────────────────────
    (function init() {
        const params = new URLSearchParams(window.location.search);
        const eleveKey = (params.get("eleve") || "").toLowerCase();
        const eleve = ELEVES[eleveKey] || null;

        // Greeting
        if (eleve) {
            document.getElementById("greeting").innerHTML =
                '<p class="greeting">Bonjour ' + escapeHtml(eleve.nom) + '</p>';
        }

        // Build cards
        const container = document.getElementById("cards");

        LINKS.forEach(function(link) {
            // Skip Drive card if no student identified
            if (link.needsEleve && !eleve) return;

            const href = link.needsEleve && eleve ? eleve.drive : link.url;
            const deepLink = link.deepLink || null;

            const a = document.createElement("a");
            a.className = "card";
            a.href = href;
            a.target = "_blank";
            a.rel = "noopener noreferrer";

            // Deep link: try native app first
            if (deepLink) {
                a.addEventListener("click", function(e) {
                    e.preventDefault();
                    window.location.href = deepLink;
                    setTimeout(function() { window.open(href, "_blank", "noopener"); }, 800);
                });
            }

            a.innerHTML =
                '<div class="card-icon">' + link.icon + '</div>' +
                '<div class="card-body">' +
                    '<div class="card-title">' + escapeHtml(link.title) + '</div>' +
                    '<div class="card-sub">' + escapeHtml(link.sub) + '</div>' +
                '</div>' +
                '<span class="card-arrow">\u203A</span>';

            container.appendChild(a);
        });

        // Register manifest
        const manifestTag = document.querySelector('script[type="application/manifest+json"]');
        if (manifestTag) {
            const blob = new Blob([manifestTag.textContent], { type: "application/json" });
            const link = document.createElement("link");
            link.rel = "manifest";
            link.href = URL.createObjectURL(blob);
            document.head.appendChild(link);
        }
    })();

    function escapeHtml(str) {
        var d = document.createElement("div");
        d.textContent = str;
        return d.innerHTML;
    }
    </script>

</body>
