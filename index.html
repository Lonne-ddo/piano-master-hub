    <style>
        :root {
            --bg: #0f0f14;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222f;
            --text: #eee;
            --text-muted: #888;
            --accent: #c9a84c;
            --accent-soft: rgba(201, 168, 76, 0.12);
            --radius: 16px;
            --tap-min: 48px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            position: relative;
            overflow-x: hidden;
        }

        #bg-canvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 16px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            justify-content: flex-start;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 32px 0 8px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header .logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            display: block;
        }

        .header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #ffffff;
        }

        .header .subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .greeting {
            text-align: center;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 8px;
            font-weight: 400;
        }

        #content {
            width: 100%;
        }

        /* Cards */
        .cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 28px;
            width: 100%;
        }

        .card {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 16px;
            text-decoration: none;
            color: var(--text);
            min-height: var(--tap-min);
            transition: background 0.2s, transform 0.15s;
            opacity: 0;
            transform: translateY(12px);
            animation: fadeInUp 0.4s ease forwards;
        }

        .card:nth-child(1) { animation-delay: 0.05s; }
        .card:nth-child(2) { animation-delay: 0.10s; }
        .card:nth-child(3) { animation-delay: 0.15s; }
        .card:nth-child(4) { animation-delay: 0.20s; }
        .card:nth-child(5) { animation-delay: 0.25s; }
        .card:nth-child(6) { animation-delay: 0.30s; }
        .card:nth-child(7) { animation-delay: 0.35s; }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .card:active {
            transform: scale(0.97);
            background: var(--bg-card-hover);
        }

        @media (hover: hover) {
            .card:hover {
                background: var(--bg-card-hover);
                transform: translateY(-2px);
            }
        }

        .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--accent-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.3rem;
        }

        .card-body {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .card-sub {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .card-arrow {
            color: var(--text-muted);
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* Koalendar inline widget */
        .koalendar-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            opacity: 0;
        }

        .koalendar-section.open {
            max-height: 800px;
            opacity: 1;
        }

        .koalendar-wrapper {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 16px 8px;
            margin-top: 4px;
        }

        .koalendar-wrapper iframe {
            border-radius: 8px;
        }

        .card-chevron {
            color: var(--text-muted);
            font-size: 1.1rem;
            flex-shrink: 0;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .card-chevron.open {
            transform: rotate(180deg);
        }

        /* Prénom input (élève non identifié) */
        .prenom-section {
            width: 100%;
            margin-top: 28px;
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius);
            padding: 24px 20px;
        }

        .prenom-section h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .prenom-section .lead {
            font-size: 0.88rem;
            color: var(--text-muted);
            margin-bottom: 18px;
        }

        .prenom-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .prenom-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .prenom-input:focus {
            border-color: var(--accent);
        }

        .prenom-submit {
            width: 100%;
            padding: 14px 16px;
            background: var(--accent);
            color: #0f0f14;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            min-height: var(--tap-min);
            transition: opacity 0.2s, transform 0.15s;
        }

        .prenom-submit:active {
            transform: scale(0.97);
            opacity: 0.85;
        }

        .prenom-error {
            color: #ff6b6b;
            font-size: 0.82rem;
            margin-top: 4px;
            min-height: 1em;
        }

        /* Footer "Changer de profil" */
        .footer-actions {
            margin-top: 32px;
            text-align: center;
            width: 100%;
        }

        .footer-actions button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.82rem;
            cursor: pointer;
            font-family: inherit;
            padding: 8px 12px;
        }

        .footer-actions button:hover {
            color: var(--text);
            text-decoration: underline;
        }

        /* ── Dashboard élève ─────────────────────────────────── */

        .programme-block {
            width: 100%;
            margin-top: 24px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius);
            padding: 14px 18px;
        }

        .programme-meta {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .programme-meta strong {
            color: var(--text);
            font-weight: 600;
        }

        .progress-track {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 999px;
            transition: width 0.4s ease;
        }

        /* Devoirs — accent violet, mis en avant */
        .devoirs-block {
            width: 100%;
            margin-top: 16px;
            background: rgba(139, 111, 232, 0.08);
            border: 1px solid rgba(139, 111, 232, 0.3);
            border-radius: var(--radius);
            padding: 22px 22px 20px;
        }

        .devoirs-block h2 {
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 14px;
        }

        .devoirs-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .devoirs-list li {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text);
            white-space: pre-wrap;
        }

        .devoirs-list li::before {
            content: "•";
            color: #8B6FE8;
            font-size: 1.25rem;
            line-height: 1;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .devoirs-empty {
            font-size: 0.92rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* Résumé du dernier cours */
        .resume-block {
            width: 100%;
            margin-top: 16px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: var(--radius);
            padding: 20px;
        }

        .resume-block h2 {
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .resume-block .resume-meta {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 14px;
        }

        .resume-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 18px;
        }

        .resume-list li {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.92rem;
            line-height: 1.5;
            color: var(--text);
            white-space: pre-wrap;
        }

        .resume-list li::before {
            content: "—";
            color: var(--text-muted);
            flex-shrink: 0;
            margin-top: 1px;
        }

        .resume-empty {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 18px;
        }

        .doc-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            border: 1px solid rgba(139, 111, 232, 0.5);
            border-radius: 10px;
            background: rgba(139, 111, 232, 0.08);
            color: #b69dfb;
            font-size: 0.88rem;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
            min-height: 40px;
        }

        .doc-btn:hover {
            background: rgba(139, 111, 232, 0.18);
            border-color: rgba(139, 111, 232, 0.7);
            color: #d2c2ff;
        }

        /* Skeleton inline pendant fetch */
        .skeleton {
            height: 12px;
            background: linear-gradient(90deg, rgba(255,255,255,0.04), rgba(255,255,255,0.10), rgba(255,255,255,0.04));
            background-size: 200% 100%;
            border-radius: 6px;
            animation: shimmer 1.4s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Section ressources */
        .cards-section-title {
            font-size: 0.74rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
            margin-top: 28px;
            margin-bottom: 8px;
            padding: 0 4px;
            width: 100%;
        }

        .dashboard-cards {
            margin-top: 4px;
        }

        @media (max-width: 480px) {
            .devoirs-block { padding: 18px 16px 16px; }
            .resume-block { padding: 16px; }
            .programme-block { padding: 12px 14px; }
        }

    </style>
</head>

    <script>
    // ──────────────────────────────────────────────
    //  WHITELIST ÉLÈVES — slugs + prénom + alias only.
    //  Aucune URL Drive/Telegram/Koalendar custom ici :
    //  les données privées sont servies par /api/eleves/{slug}/...
    // ──────────────────────────────────────────────
    var ELEVES_WHITELIST = {
        japhet: { display: "Japhet", aliases: ["japhet"] },
        tara:   { display: "Tara",   aliases: ["tara"] },
        dexter: { display: "Dexter", aliases: ["dexter"] },
        messon: { display: "Messon", aliases: ["messon"] }
    };

    // ──────────────────────────────────────────────
    //  Helpers
    // ──────────────────────────────────────────────
    function normalize(s) {
        return String(s == null ? "" : s)
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase()
            .trim();
    }

    function findEleveBySlug(slug) {
        var key = normalize(slug);
        if (!key || !ELEVES_WHITELIST[key]) return null;
        return { slug: key, display: ELEVES_WHITELIST[key].display };
    }

    function findEleveByName(name) {
        var norm = normalize(name);
        if (!norm) return null;
        for (var slug in ELEVES_WHITELIST) {
            var aliases = ELEVES_WHITELIST[slug].aliases || [];
            for (var i = 0; i < aliases.length; i++) {
                if (normalize(aliases[i]) === norm) {
                    return { slug: slug, display: ELEVES_WHITELIST[slug].display };
                }
            }
        }
        return null;
    }

    function escapeHtml(str) {
        var d = document.createElement("div");
        d.textContent = str;
        return d.innerHTML;
    }

    // ──────────────────────────────────────────────
    //  Icônes (SVG inline, blanc 20x20)
    // ──────────────────────────────────────────────
    var ICONS = {
        play:     '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon points="7,4 19,12 7,20" stroke="#fff" stroke-width="1.5" stroke-linejoin="round" fill="none"/></svg>',
        tools:    '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>',
        bolt:     '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 2L4 14h7l-1 8 9-12h-7l1-8z" stroke="#fff" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" fill="none"/></svg>',
        calendar: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="4" width="18" height="18" rx="3" stroke="#fff" stroke-width="1.5" fill="none"/><line x1="3" y1="10" x2="21" y2="10" stroke="#fff" stroke-width="1.5"/><line x1="8" y1="2" x2="8" y2="6" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/><line x1="16" y1="2" x2="16" y2="6" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>'
    };

    // ──────────────────────────────────────────────
    //  Init — détection slug par URL puis fallback localStorage
    // ──────────────────────────────────────────────
    (function init() {
        var pathMatch = window.location.pathname.match(/^\/([^\/]+)\/?$/);
        var pathSlug = pathMatch ? normalize(pathMatch[1]) : null;
        var eleve = pathSlug ? findEleveBySlug(pathSlug) : null;

        if (!eleve) {
            var stored = localStorage.getItem("eleve_slug");
            if (stored) eleve = findEleveBySlug(stored);
        }

        if (eleve) {
            localStorage.setItem("eleve_slug", eleve.slug);
            renderEspaceEleve(eleve);
        } else {
            renderPrenomInput();
        }
    })();

    // ──────────────────────────────────────────────
    //  Mode 1 — élève non identifié : input prénom
    // ──────────────────────────────────────────────
    function renderPrenomInput() {
        var content = document.getElementById("content");
        content.innerHTML =
            '<div class="prenom-section">' +
                '<h2>Bienvenue</h2>' +
                '<p class="lead">Entre ton prénom pour accéder à ton espace.</p>' +
                '<form class="prenom-form" id="prenom-form" autocomplete="off">' +
                    '<input type="text" class="prenom-input" id="prenom-input" placeholder="Ton prénom" autocapitalize="words" autocomplete="given-name" />' +
                    '<button type="submit" class="prenom-submit">Entrer</button>' +
                    '<div class="prenom-error" id="prenom-error"></div>' +
                '</form>' +
            '</div>';

        var form = document.getElementById("prenom-form");
        var input = document.getElementById("prenom-input");
        var errorBox = document.getElementById("prenom-error");

        form.addEventListener("submit", function(e) {
            e.preventDefault();
            errorBox.textContent = "";
            var match = findEleveByName(input.value);
            if (!match) {
                errorBox.textContent = "Prénom inconnu. Vérifie l'orthographe.";
                return;
            }
            localStorage.setItem("eleve_slug", match.slug);
            window.location.href = "/" + match.slug;
        });

        setTimeout(function() { try { input.focus(); } catch (e) {} }, 200);
    }

    // ──────────────────────────────────────────────
    //  Mode 2 — élève identifié : dashboard riche
    //  (programme, devoirs, résumé dernier cours, ressources)
    // ──────────────────────────────────────────────
    function renderEspaceEleve(eleve) {
        var greeting = document.getElementById("greeting");
        greeting.innerHTML = '<p class="greeting">Bonjour ' + escapeHtml(eleve.display) + ' \uD83D\uDC4B</p>';

        var content = document.getElementById("content");
        content.innerHTML =
            '<div id="programme-zone"></div>' +
            '<div id="devoirs-zone"></div>' +
            '<div id="resume-zone"></div>' +
            '<div class="cards-section-title">Ressources</div>' +
            '<div class="cards dashboard-cards" id="cards"></div>';

        renderResourceCards(eleve);
        renderFooter();
        renderDynamicSkeleton();
        fetchDashboardData(eleve);
    }

    function renderDynamicSkeleton() {
        document.getElementById("programme-zone").innerHTML =
            '<div class="programme-block">' +
                '<div class="skeleton" style="width:78%"></div>' +
                '<div class="skeleton" style="width:42%; margin-bottom:0; margin-top:6px"></div>' +
            '</div>';
        document.getElementById("devoirs-zone").innerHTML =
            '<div class="devoirs-block">' +
                '<h2>\uD83D\uDCDD Tes devoirs pour la prochaine séance</h2>' +
                '<div class="skeleton" style="width:85%"></div>' +
                '<div class="skeleton" style="width:65%"></div>' +
                '<div class="skeleton" style="width:90%; margin-bottom:0"></div>' +
            '</div>';
        document.getElementById("resume-zone").innerHTML =
            '<div class="resume-block">' +
                '<h2>\u2728 Dernier cours</h2>' +
                '<div class="resume-meta"><span class="skeleton" style="display:inline-block; width:55%; height:10px; vertical-align:middle"></span></div>' +
                '<div class="skeleton" style="width:92%"></div>' +
                '<div class="skeleton" style="width:70%; margin-bottom:0"></div>' +
            '</div>';
    }

    function fetchDashboardData(eleve) {
        fetch('/api/eleves/' + eleve.slug + '/public', { credentials: 'omit' })
            .then(function(r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function(data) {
                renderProgramme(data && data.stats);
                renderDevoirs(data && data.derniere_seance);
                renderResume(data && data.derniere_seance, data && data.doc_url);
            })
            .catch(function(e) {
                console.error('[espace] fetch failed:', e && e.message ? e.message : e);
                document.getElementById("programme-zone").innerHTML = '';
                document.getElementById("devoirs-zone").innerHTML =
                    '<div class="devoirs-block">' +
                        '<h2>\uD83D\uDCDD Tes devoirs pour la prochaine séance</h2>' +
                        '<p class="devoirs-empty">Données momentanément indisponibles. Réessaie plus tard.</p>' +
                    '</div>';
                document.getElementById("resume-zone").innerHTML = '';
            });
    }

    function renderProgramme(stats) {
        var zone = document.getElementById("programme-zone");
        if (!stats || stats.nb_cours == null || !stats.date_debut_label || !stats.date_fin_label) {
            zone.innerHTML = '';
            return;
        }
        var pct = (typeof stats.progression_pct === 'number')
            ? Math.max(0, Math.min(100, stats.progression_pct))
            : Math.max(0, Math.min(100, Math.round((stats.nb_cours / 8) * 100)));
        zone.innerHTML =
            '<div class="programme-block">' +
                '<div class="programme-meta">' +
                    '<strong>Cours ' + escapeHtml(String(stats.nb_cours)) + ' sur 8</strong>' +
                    ' \u00B7 ' + escapeHtml(stats.date_debut_label) +
                    ' \u2192 ' + escapeHtml(stats.date_fin_label) +
                '</div>' +
                '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
            '</div>';
    }

    function renderDevoirs(derniere) {
        var zone = document.getElementById("devoirs-zone");
        var devoirs = (derniere && Array.isArray(derniere.devoirs))
            ? derniere.devoirs.filter(Boolean)
            : null;
        var html = '<div class="devoirs-block"><h2>\uD83D\uDCDD Tes devoirs pour la prochaine séance</h2>';
        if (!devoirs || devoirs.length === 0) {
            html += '<p class="devoirs-empty">Aucun devoir spécifique. Continue à pratiquer ce qu\'on a vu en cours.</p>';
        } else {
            html += '<ul class="devoirs-list">';
            for (var i = 0; i < devoirs.length; i++) {
                html += '<li>' + escapeHtml(String(devoirs[i])) + '</li>';
            }
            html += '</ul>';
        }
        html += '</div>';
        zone.innerHTML = html;
    }

    function renderResume(derniere, docUrl) {
        var zone = document.getElementById("resume-zone");
        var resume = (derniere && Array.isArray(derniere.resume))
            ? derniere.resume.filter(Boolean)
            : null;
        var date = derniere && derniere.date ? formatDate(derniere.date) : null;
        var titre = derniere && derniere.titre ? String(derniere.titre).trim() : null;
        var metaBits = [];
        if (date) metaBits.push(date);
        if (titre) metaBits.push(titre);
        var meta = metaBits.join(' \u00B7 ');

        var html = '<div class="resume-block">' +
            '<h2>\u2728 Dernier cours</h2>';
        if (meta) html += '<div class="resume-meta">' + escapeHtml(meta) + '</div>';

        if (!resume || resume.length === 0) {
            html += '<p class="resume-empty">Pas encore de résumé disponible. Reviens après ton prochain cours.</p>';
        } else {
            html += '<ul class="resume-list">';
            for (var i = 0; i < resume.length; i++) {
                html += '<li>' + escapeHtml(String(resume[i])) + '</li>';
            }
            html += '</ul>';
        }

        if (docUrl) {
            html += '<a class="doc-btn" href="' + escapeHtml(docUrl) + '" target="_blank" rel="noopener noreferrer">' +
                'Ouvrir mes notes complètes \u2192' +
            '</a>';
        }
        html += '</div>';
        zone.innerHTML = html;
    }

    function formatDate(iso) {
        if (!iso) return "";
        var m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
        if (!m) return iso;
        var months = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
        return parseInt(m[3], 10) + " " + months[parseInt(m[2], 10) - 1] + " " + m[1];
    }

    function renderResourceCards(eleve) {
        var cardsContainer = document.getElementById("cards");
        var slug = eleve.slug;
        var koalendarUrl = "https://koalendar.com/e/cours-piano-master?name=" + encodeURIComponent(eleve.display);
        var koalendarInitialized = false;

        // Cartes générées en HTML template inline. Outils est un vrai <a> avec
        // href interpolé sur le slug courant — pas de div+JS handler.
        cardsContainer.innerHTML =
            // Outils — anchor interne, slug en query string (bypass CF Pages multi-segment rewrite)
            '<a class="card" href="/outils?eleve=' + encodeURIComponent(slug) + '">' +
                '<div class="card-icon">' + ICONS.tools + '</div>' +
                '<div class="card-body">' +
                    '<div class="card-title">Outils</div>' +
                    '<div class="card-sub">Tes exercices interactifs</div>' +
                '</div>' +
                '<span class="card-arrow">\u203A</span>' +
            '</a>' +
            // Vidéos — anchor externe Bonzai
            '<a class="card" href="https://www.bonzai.pro/Lonne/shop/lvgv_2905/piano-master" target="_blank" rel="noopener noreferrer">' +
                '<div class="card-icon">' + ICONS.play + '</div>' +
                '<div class="card-body">' +
                    '<div class="card-title">Vidéos de formation</div>' +
                    '<div class="card-sub">Bonzai — cours enregistrés</div>' +
                '</div>' +
                '<span class="card-arrow">\u203A</span>' +
            '</a>' +
            // Cours en live — anchor Discord (deeplink mobile câblé après render)
            '<a class="card" id="card-live" href="https://discord.gg/KtJF8dPT" target="_blank" rel="noopener noreferrer">' +
                '<div class="card-icon">' + ICONS.bolt + '</div>' +
                '<div class="card-body">' +
                    '<div class="card-title">Cours en live</div>' +
                    '<div class="card-sub">Rejoindre sur Discord</div>' +
                '</div>' +
                '<span class="card-arrow">\u203A</span>' +
            '</a>' +
            // Réserver — bouton toggle pour widget Koalendar inline
            '<div class="card" role="button" tabindex="0" id="card-rdv" style="cursor:pointer">' +
                '<div class="card-icon">' + ICONS.calendar + '</div>' +
                '<div class="card-body">' +
                    '<div class="card-title">Réserver un cours</div>' +
                    '<div class="card-sub">Koalendar</div>' +
                '</div>' +
                '<span class="card-chevron">\u25BC</span>' +
            '</div>' +
            '<div class="koalendar-section" id="koalendar-section">' +
                '<div class="koalendar-wrapper">' +
                    '<div id="inline-widget-cours-piano-master"></div>' +
                '</div>' +
            '</div>';

        // Discord deeplink sur mobile (fallback web après 800 ms)
        var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) {
            document.getElementById("card-live").addEventListener("click", function(e) {
                e.preventDefault();
                window.location.href = "discord://channels/KtJF8dPT";
                setTimeout(function() { window.open("https://discord.gg/KtJF8dPT", "_blank", "noopener"); }, 800);
            });
        }

        // Toggle Koalendar inline
        var rdvBtn = document.getElementById("card-rdv");
        var koalendarSection = document.getElementById("koalendar-section");
        rdvBtn.addEventListener("click", function() {
            var isOpen = koalendarSection.classList.toggle("open");
            var chevron = rdvBtn.querySelector(".card-chevron");
            if (chevron) chevron.classList.toggle("open", isOpen);
            if (isOpen && !koalendarInitialized) {
                koalendarInitialized = true;
                Koalendar("inline", {
                    "url": koalendarUrl,
                    "selector": "#inline-widget-cours-piano-master"
                });
            }
        });
    }

    function renderFooter() {
        var footer = document.getElementById("footer");
        footer.innerHTML =
            '<div class="footer-actions">' +
                '<button type="button" id="change-profile-btn">Changer de profil</button>' +
            '</div>';
        document.getElementById("change-profile-btn").addEventListener("click", function() {
            localStorage.removeItem("eleve_slug");
            window.location.href = "/";
        });
    }

    // ──────────────────────────────────────────────
    //  PWA manifest (inline blob)
    // ──────────────────────────────────────────────
    (function() {
        var manifestTag = document.querySelector('script[type="application/manifest+json"]');
        if (!manifestTag) return;
        var blob = new Blob([manifestTag.textContent], { type: "application/json" });
        var link = document.createElement("link");
        link.rel = "manifest";
        link.href = URL.createObjectURL(blob);
        document.head.appendChild(link);
    })();
    </script>

    <script>
    // ──────────────────────────────────────────────
    //  FOND ANIMÉ — touches de piano flottantes
    // ──────────────────────────────────────────────
    (function() {
        var canvas = document.getElementById("bg-canvas");
        var ctx = canvas.getContext("2d");
        var particles = [];
        var COUNT = 18;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resize);
        resize();

        function createParticle() {
            var w = 6 + Math.random() * 4;
            var h = 18 + Math.random() * 10;
            return {
                x: Math.random() * canvas.width,
                y: canvas.height + h,
                w: w,
                h: h,
                r: 2,
                speed: 0.15 + Math.random() * 0.35,
                opacity: 0.04 + Math.random() * 0.04,
                drift: (Math.random() - 0.5) * 0.3
            };
        }

        for (var i = 0; i < COUNT; i++) {
            var p = createParticle();
            p.y = Math.random() * canvas.height;
            particles.push(p);
        }

        function drawRoundRect(x, y, w, h, r, alpha) {
            ctx.globalAlpha = alpha;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
            ctx.fill();
        }

        var rafId = null;
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (var i = 0; i < particles.length; i++) {
                var p = particles[i];
                p.y -= p.speed;
                p.x += p.drift;
                drawRoundRect(p.x, p.y, p.w, p.h, p.r, p.opacity);
                if (p.y + p.h < 0) {
                    particles[i] = createParticle();
                }
            }
            rafId = requestAnimationFrame(animate);
        }
        animate();
        var stopAnim = function () {
            if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
            window.removeEventListener("resize", resize);
        };
        window.addEventListener("beforeunload", stopAnim);
        window.addEventListener("pagehide", stopAnim);
    })();
    </script>
